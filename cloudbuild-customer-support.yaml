steps:
  # Build customer-support-service Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'SERVICE_NAME=customer-support-service'
      - '-t'
      - 'gcr.io/$PROJECT_ID/customer-support-service:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/customer-support-service:latest'
      - '-f'
      - 'Dockerfile.cloudrun-service'
      - '.'
    timeout: '1800s'

  # Push versioned tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/customer-support-service:$BUILD_ID']

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/customer-support-service:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'customer-support-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/customer-support-service:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3013'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '60'
      - '--update-secrets=WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest,META_WA_ACCESS_TOKEN=META_WA_ACCESS_TOKEN:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production,GCP_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/customer-support-service:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/customer-support-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

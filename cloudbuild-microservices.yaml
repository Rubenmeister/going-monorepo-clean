# Parameterized Cloud Build for Going platform microservices
# Usage (always quote the --substitutions value to avoid shell parsing issues with & and = in URLs):
#   gcloud builds submit --config=cloudbuild-microservices.yaml \
#     --substitutions='_SERVICE_NAME=user-auth-service' \
#     --project=going-5d1ae .
#
# SECRETS requeridos en GCP Secret Manager (proyecto going-5d1ae):
#   JWT_SECRET-prod          → el JWT secret compartido
#   MONGO_URL-prod           → mongodb+srv://... conexión principal
#   redis-url                → redis://...
#   GMAIL_APP_PASSWORD       → contraseña de app Gmail para emails
#
# Para crear/actualizar un secret:
#   echo -n "valor" | gcloud secrets create JWT_SECRET-prod --data-file=- --project=going-5d1ae
#   echo -n "valor" | gcloud secrets versions add JWT_SECRET-prod --data-file=- --project=going-5d1ae

substitutions:
  _SERVICE_NAME: user-auth-service
  _IMAGE_TAG: latest  # overridden by CI/CD with github.sha

steps:
  # Step -1: Pre-pull latest image for Docker layer cache (best-effort).
  # Si la imagen no existe (primer build), || exit 0 evita romper el pipeline.
  # Acelera builds subsiguientes 30-50% al reusar layers.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest || exit 0'

  # Step 0: Build Docker image con --cache-from para reusar layers
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'SERVICE_NAME=${_SERVICE_NAME}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile.cloudrun-service'
      - '.'
    timeout: '1800s'

  # Step 1: Push SHA-tagged image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'

  # Step 2: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Step 3: Deploy to Cloud Run
  # NOTA: roles/secretmanager.secretAccessor NO permite "secrets describe",
  # por eso los secrets se inyectan directamente sin verificación previa.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Deploying ${_SERVICE_NAME} (tag: ${_IMAGE_TAG}) ==="
        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG} \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 3000 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 5 \
          --timeout 60 \
          --set-env-vars NODE_ENV=production,JWT_EXPIRES_IN=15m,FRONTEND_URL=https://goingec.com \
          --update-secrets=JWT_SECRET=JWT_SECRET-prod:latest,MONGO_URL=MONGO_URL-prod:latest,USER_DB_URL=MONGO_URL-prod:latest,REDIS_URL=redis-url:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest
        echo "=== Deploy complete for ${_SERVICE_NAME} ==="

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

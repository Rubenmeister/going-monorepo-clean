# Parameterized Cloud Build for Going platform microservices
# Usage (always quote the --substitutions value to avoid shell parsing issues with & and = in URLs):
#   gcloud builds submit --config=cloudbuild-microservices.yaml \
#     --substitutions='_SERVICE_NAME=user-auth-service' \
#     --project=going-5d1ae .
#
# SECRETS requeridos en GCP Secret Manager (proyecto going-5d1ae):
#   JWT_SECRET-prod          → el JWT secret compartido
#   MONGO_URL-prod           → mongodb+srv://... conexión principal
#   redis-url                → redis://...
#   GMAIL_APP_PASSWORD       → contraseña de app Gmail para emails
#
# Para crear/actualizar un secret:
#   echo -n "valor" | gcloud secrets create JWT_SECRET-prod --data-file=- --project=going-5d1ae
#   echo -n "valor" | gcloud secrets versions add JWT_SECRET-prod --data-file=- --project=going-5d1ae

substitutions:
  _SERVICE_NAME: user-auth-service
  _IMAGE_TAG: latest  # overridden by CI/CD with github.sha
  # _MIN_INSTANCES: por defecto 0 (escala a cero entre requests).
  # Setear a 1 para servicios con @Cron / WebSocket persistente / background workers
  # (ej. booking-service tiene BookingDispatcher que requiere keep-alive).
  _MIN_INSTANCES: '0'
  # _EXTRA_ENV_VARS: env vars adicionales por servicio. Usar separador '|' (igual
  # que ^|^ del update-env-vars principal). Ejemplo para booking-service:
  #   _EXTRA_ENV_VARS='TRANSPORT_SERVICE_URL=https://...|DISPATCH_LEAD_TIME_MINUTES=30'
  # Dejar vacío si el servicio no necesita env extras.
  _EXTRA_ENV_VARS: ''
  # _EXTRA_SECRETS: secrets adicionales del Secret Manager por servicio.
  # Formato comma-separated 'ENV_NAME=SECRET_NAME:latest'. Ejemplo voice-call:
  #   _EXTRA_SECRETS='TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest'
  # Se concatenan a los secrets base (JWT_SECRET, MONGO_URL, etc.).
  _EXTRA_SECRETS: ''

steps:
  # Step -1: Pre-pull latest image for Docker layer cache (best-effort).
  # Si la imagen no existe (primer build), || exit 0 evita romper el pipeline.
  # Acelera builds subsiguientes 30-50% al reusar layers.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest || exit 0'

  # Step 0: Build Docker image con --cache-from para reusar layers
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'SERVICE_NAME=${_SERVICE_NAME}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'Dockerfile.cloudrun-service'
      - '.'
    timeout: '1800s'

  # Step 1: Push SHA-tagged image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'

  # Step 2: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Step 3: Deploy to Cloud Run
  # NOTA: roles/secretmanager.secretAccessor NO permite "secrets describe",
  # por eso los secrets se inyectan directamente sin verificación previa.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Deploying ${_SERVICE_NAME} (tag: ${_IMAGE_TAG}, min-instances: ${_MIN_INSTANCES}) ==="
        BASE_ENV="NODE_ENV=production|JWT_ACCESS_TOKEN_EXPIRES_IN=7d|JWT_REFRESH_TOKEN_EXPIRES_IN=30d|FRONTEND_URL=https://goingec.com|CORS_ORIGINS=https://goingec.com,https://www.goingec.com,https://admin.goingec.com,https://app.goingec.com,https://empresas.goingec.com,http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003"
        if [ -n "${_EXTRA_ENV_VARS}" ]; then
          ENV_VARS="$${BASE_ENV}|${_EXTRA_ENV_VARS}"
        else
          ENV_VARS="$${BASE_ENV}"
        fi
        BASE_SECRETS="JWT_SECRET=JWT_SECRET-prod:latest,MONGO_URL=MONGO_URL-prod:latest,USER_DB_URL=MONGO_URL-prod:latest,BOOKING_DB_URL=MONGO_URL-prod:latest,REDIS_URL=redis-url:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest"
        if [ -n "${_EXTRA_SECRETS}" ]; then
          ALL_SECRETS="$${BASE_SECRETS},${_EXTRA_SECRETS}"
        else
          ALL_SECRETS="$${BASE_SECRETS}"
        fi
        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG} \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --port 3000 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances ${_MIN_INSTANCES} \
          --max-instances 5 \
          --timeout 60 \
          --vpc-connector=going-connector \
          --vpc-egress=all-traffic \
          --update-env-vars="^|^$${ENV_VARS}" \
          --update-secrets="$${ALL_SECRETS}"
        echo "=== Deploy complete for ${_SERVICE_NAME} ==="

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

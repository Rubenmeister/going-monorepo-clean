.corner.tr{top:44px;right:32px;border-top:1.5px solid rgba(255,255,255,0.15);border-right:1.5px solid rgba(255,255,255,0.15);animation-delay:.4s}
.corner.bl{bottom:44px;left:32px;border-bottom:1.5px solid rgba(255,255,255,0.15);border-left:1.5px solid rgba(255,255,255,0.15);animation-delay:.5s}
.corner.br{bottom:44px;right:32px;border-bottom:1.5px solid rgba(255,255,255,0.15);border-right:1.5px solid rgba(255,255,255,0.15);animation-delay:.6s}
@keyframes cFade{to{opacity:1}}
.speed-line {
  position:absolute; height:1px; z-index:8;
  background:linear-gradient(90deg,transparent,rgba(255,76,65,0.5),transparent);
  animation:speedPass 0.9s ease-out forwards;
}
@keyframes speedPass {
  from{transform:translateX(-130%);opacity:0;width:170px}
  20%{opacity:1}
  to{transform:translateX(520px);opacity:0;width:50px}
}
.content {
  position:absolute; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.logo-container {
  display:flex; flex-direction:column; align-items:center; position:relative;
  opacity:0;
  animation:logoBorn 2.2s cubic-bezier(0.34,1.2,0.64,1) 0.7s forwards;
}
@keyframes logoBorn {
  0%   {opacity:0;transform:scale(0.22);filter:blur(22px)}
  55%  {opacity:1;transform:scale(1.06);filter:blur(0)}
  100% {opacity:1;transform:scale(1);filter:blur(0)}
}
.logo-halo {
  position:absolute; width:300px; height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,76,65,0.20) 0%,transparent 65%);
  animation:haloPulse 3.2s ease-in-out infinite; z-index:0;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
@keyframes haloPulse{
  0%,100%{transform:translate(-50%,-50%) scale(0.75);opacity:0.20}
  50%{transform:translate(-50%,-50%) scale(1.35);opacity:0.50}
}
.logo-img {
  width:190px; position:relative; z-index:1;
  filter:
    drop-shadow(0 0 20px rgba(255,76,65,0.85))
    drop-shadow(0 0 55px rgba(255,76,65,0.45))
    drop-shadow(0 0 100px rgba(255,80,55,0.20));
}
.tagline {
  margin-top:14px; position:relative; z-index:1;
  opacity:0; animation:fadeUp 1s ease 2.5s forwards;
}
.tagline span {
  font-size:10px; font-weight:800;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  text-shadow:0 0 16px rgba(255,76,65,0.38);
}
.est-wrap {
  position:absolute; bottom:62px; left:0; right:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  opacity:0; animation:fadeUp 1s ease 3s forwards;
}
.est-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,76,65,0.40),transparent)}
.est-text{font-size:9px;font-weight:900;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.22)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sbars {
  position:absolute; top:50px; right:36px; z-index:15;
  display:flex; align-items:center; gap:3px;
  opacity:0; transition:opacity 0.3s;
}
.sbars.on{opacity:1}
.bar{width:3px;border-radius:2px;background:rgba(255,76,65,0.72);animation:bAnim .5s ease-in-out infinite alternate}
.bar:nth-child(1){height:5px;animation-delay:0s}
.bar:nth-child(2){height:12px;animation-delay:.1s}
.bar:nth-child(3){height:7px;animation-delay:.2s}
.bar:nth-child(4){height:14px;animation-delay:.07s}
.bar:nth-child(5){height:5px;animation-delay:.16s}
@keyframes bAnim{to{transform:scaleY(0.15)}}

/* Botón de sonido */
.sound-btn {
  position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
  z-index:20;
  background:rgba(255,76,65,0.15);
  border:1px solid rgba(255,76,65,0.5);
  color:rgba(255,255,255,0.80);
  padding:9px 22px; border-radius:30px;
  font-size:11px; font-weight:800; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; backdrop-filter:blur(10px);
  font-family:'Nunito',sans-serif;
  opacity:0; animation:fadeUp 1s ease 2.8s forwards;
  transition: background 0.2s, opacity 0.3s;
}
.sound-btn:hover{ background:rgba(255,76,65,0.28); }
.sound-btn.hidden{ opacity:0 !important; pointer-events:none; }
</style>
</head>

  function step(now){
    const t = Math.min((now - start) / total, 1);
    const e = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
    const a0=(0.70-e*0.55).toFixed(2), a1=(0.52-e*0.40).toFixed(2), a2=(0.42-e*0.32).toFixed(2);
    overlay.style.background=`linear-gradient(180deg,rgba(2,4,12,${a0}) 0%,rgba(4,6,16,${a1}) 45%,rgba(8,4,4,${a2}) 100%)`;
    bgPhoto.style.filter=`brightness(${(0.52+e*0.38).toFixed(2)}) saturate(${(1.1+e*0.3).toFixed(2)})`;
    const g1=(e*0.58).toFixed(2), g2=(e*0.35).toFixed(2);
    glow.style.background=`radial-gradient(ellipse 90% 48% at 50% 74%,rgba(255,55,25,${g1}) 0%,rgba(180,18,8,${g2}) 55%,transparent 100%)`;
    glow.style.opacity='1';
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function spawnLines(){
  const c=document.getElementById('lines');
  [240,300,358,415,465].forEach((top,i)=>{
    const el=document.createElement('div');
    el.className='speed-line'; el.style.top=top+'px';
    el.style.animationDelay=(i*65)+'ms';
    c.appendChild(el); el.addEventListener('animationend',()=>el.remove());
  });
}

// SONIDO — requiere interacción del usuario (política del navegador)
function playSupercar(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return;
  const ctx=new AC(), now=ctx.currentTime, dur=4.8;
  const master=ctx.createGain(); master.gain.value=0.72;
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-20; comp.knee.value=14; comp.ratio.value=3;
  comp.attack.value=0.02; comp.release.value=0.4;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700; lp.Q.value=0.5;
  const warm=ctx.createBiquadFilter(); warm.type='peaking'; warm.frequency.value=220; warm.Q.value=1.0; warm.gain.value=6;
  warm.connect(lp); lp.connect(master); master.connect(comp); comp.connect(ctx.destination);

  function ignition(){
    const len=Math.floor(ctx.sampleRate*0.55),buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(len*.18));
    const src=ctx.createBufferSource(),gn=ctx.createGain();
    const lpI=ctx.createBiquadFilter(); lpI.type='lowpass'; lpI.frequency.value=140;
    gn.gain.setValueAtTime(2.8,now); gn.gain.linearRampToValueAtTime(0,now+0.55);
    src.buffer=buf; src.connect(lpI); lpI.connect(gn); gn.connect(comp); src.start(now);
  }
  function rumble(f0,f1,g){
    const osc=ctx.createOscillator(),gn=ctx.createGain(),ws=ctx.createWaveShaper();
    const curve=new Float32Array(512);
    for(let i=0;i<512;i++){const x=(i*2)/512-1;curve[i]=Math.tanh(x*1.6)*0.75;}
    ws.curve=curve; osc.type='sawtooth';
    osc.frequency.setValueAtTime(f0,now);
    osc.frequency.exponentialRampToValueAtTime(f0*.82,now+0.6);
    osc.frequency.exponentialRampToValueAtTime(f1*.5,now+1.8);
    osc.frequency.exponentialRampToValueAtTime(f1*.78,now+3.2);
    osc.frequency.exponentialRampToValueAtTime(f1,now+dur*.82);
    osc.frequency.exponentialRampToValueAtTime(f1*.68,now+dur);
    gn.gain.setValueAtTime(0,now); gn.gain.linearRampToValueAtTime(g,now+0.3);
    gn.gain.linearRampToValueAtTime(g*1.25,now+dur*.72); gn.gain.linearRampToValueAtTime(0,now+dur+0.5);
    osc.connect(ws); ws.connect(gn); gn.connect(warm); osc.start(now); osc.stop(now+dur+0.6);
  }
  function cylinders(){
    [0.08,0.19,0.28,0.38,0.47,0.55,0.62,0.68,0.74,0.80,0.86,0.91,0.96,1.00].forEach((frac,i)=>{
      const t=now+frac*1.5,len=Math.floor(ctx.sampleRate*0.10);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
      for(let j=0;j<len;j++) d[j]=(Math.random()*2-1)*Math.exp(-j/(len*.22));
      const src=ctx.createBufferSource(),gn=ctx.createGain();
      const lpC=ctx.createBiquadFilter(); lpC.type='lowpass'; lpC.frequency.value=160+i*8;
      gn.gain.value=0.55+i*0.025;
      src.buffer=buf; src.connect(lpC); lpC.connect(gn); gn.connect(comp); src.start(t);
    });
  }
  ignition(); cylinders(); rumble(55,260,0.38); rumble(110,520,0.20);
}

// Animación visual arranca sola
let started = false;
function start() {
  if(started) return; started = true;
  document.getElementById('soundBtn').classList.add('hidden');
  try {
    playSupercar();
    const sb=document.getElementById('sbars'); sb.classList.add('on');
    setTimeout(()=>sb.classList.remove('on'), 5200);
  } catch(e) { console.warn(e); }
  spawnLines();
  setTimeout(animateDawn, 700);
}
window.addEventListener('load', () => setTimeout(start, 300));
document.getElementById('phone').addEventListener('click', () => {
  if(!started) { start(); }
  else { started = false; location.reload(); }
});
</script>

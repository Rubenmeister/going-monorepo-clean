# going-agent — Cloud Run Job (cron-triggered) deployment
#
# Build context: monorepo ROOT — usa Dockerfile.cloudrun-agent del root
# (el genérico ya incluye `git` en runtime para que going-agent pueda
# clonar el repo + commit/push).
#
# Trigger:
#   gcloud builds submit . --config=going-agent/cloudbuild.yaml --project=going-5d1ae
#
# Schedule: cada 6 horas. Vars seteadas fuera de Cloud Build:
#   CEREBRO_PUBLISH_ENABLED=true|false  (default false hasta cerebro-service listo)

steps:
  # 1. Build con Dockerfile genérico de agentes, contexto = monorepo root.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.cloudrun-agent
      - --build-arg
      - AGENT_NAME=going-agent
      - -t
      - gcr.io/$PROJECT_ID/going-agent:latest
      - .
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/going-agent:latest']

  # 2. Deploy como Cloud Run Job.
  #
  # Modelo: Gemini 2.5 Flash via Vertex AI (ADC del SA, sin API key).
  # Secrets:
  #   GIT_TOKEN            — PAT/GitHub App token para clonar + push agent/fixes
  #   TELEGRAM_BOT_TOKEN   — bot que reporta el ciclo
  #   TELEGRAM_CHAT_ID     — chat ops donde llega el reporte
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - going-agent
      - --image=gcr.io/$PROJECT_ID/going-agent:latest
      - --region=us-central1
      - --memory=2Gi
      - --cpu=2
      - --max-retries=1
      - --task-timeout=300s
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1,REPO_PATH=/tmp/going-repo,REPO_URL=github.com/Rubenmeister/going-monorepo-clean.git,AGENT_MODEL=gemini-2.5-flash,CEREBRO_PUBLISH_ENABLED=true
      - --set-secrets=GIT_TOKEN=GIT_TOKEN:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # 3. Cloud Scheduler — cada 6 horas (UTC).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe going-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http going-agent-trigger \
            --location=us-central1 \
            --schedule="0 */6 * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/going-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http going-agent-trigger \
            --location=us-central1 \
            --schedule="0 */6 * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/going-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/going-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1500s'

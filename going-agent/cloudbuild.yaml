steps:
  # 1. Build imagen del agente
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/going-agent:latest
      - .

  # 2. Push a Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/going-agent:latest']

  # 3. Crear o actualizar el Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - going-agent
      - --image=gcr.io/$PROJECT_ID/going-agent:latest
      - --region=us-central1
      - --memory=512Mi
      - --cpu=1
      - --max-retries=1
      - --task-timeout=300s
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GIT_TOKEN=GIT_TOKEN:latest
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # 4. Crear/actualizar Cloud Scheduler (dispara el Job cada 30 minutos)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe going-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http going-agent-trigger \
            --location=us-central1 \
            --schedule="*/30 * * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/going-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http going-agent-trigger \
            --location=us-central1 \
            --schedule="*/30 * * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/going-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/going-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

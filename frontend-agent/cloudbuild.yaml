# frontend-agent — Cloud Run Job (cron-triggered) deployment
#
# Build context: monorepo ROOT — Dockerfile genérico
# `Dockerfile.cloudrun-agent` necesita acceso a pnpm-workspace.yaml,
# pnpm-lock.yaml, libs/cerebro-contracts y frontend-agent/.
#
# Trigger:
#   gcloud builds submit . --config=frontend-agent/cloudbuild.yaml --project=going-5d1ae
#
# Schedule: cada 6h, ventana suficiente para detectar fallos de deploys
# y patrones acumulativos sin spammear el Cerebro.
#
# Vars seteadas via gcloud run jobs update --update-env-vars cuando el
# operador haya creado un PAT en Vercel:
#   VERCEL_TOKEN     (secret)
#   VERCEL_TEAM_ID   (opcional — si la cuenta es team)
#   VERCEL_PROJECTS  (default: 'frontend-webapp,admin-dashboard,corporate-portal')
# Sin estas vars el agent corre en modo idle (anomaly + exit 0).

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.cloudrun-agent
      - --build-arg
      - AGENT_NAME=frontend-agent
      - -t
      - gcr.io/$PROJECT_ID/frontend-agent:latest
      - .
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/frontend-agent:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - frontend-agent
      - --image=gcr.io/$PROJECT_ID/frontend-agent:latest
      - --region=us-central1
      - --memory=512Mi
      - --cpu=1
      - --max-retries=1
      - --task-timeout=300s
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,VERCEL_LOOKBACK_HOURS=6
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # Schedule: cada 6h (ofset 30 min vs mobile-agent para repartir carga).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe frontend-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http frontend-agent-trigger \
            --location=us-central1 \
            --schedule="30 */6 * * *" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/frontend-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http frontend-agent-trigger \
            --location=us-central1 \
            --schedule="30 */6 * * *" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/frontend-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/frontend-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1500s'

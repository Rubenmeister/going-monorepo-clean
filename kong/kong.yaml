# Going Kong API Gateway — DB-less Declarative Config
# Usage: docker-compose -f docker-compose.yml -f docker-compose.kong.yml up -d
# Kong sits in FRONT of the NestJS api-gateway, providing auth, rate-limit, and routing.

_format_version: "3.0"
_transform: true

# ── SERVICES (upstream backends) ─────────────────────────────
services:
  - name: going-api-gateway
    url: http://api-gateway:3000
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    retries: 3
    tags:
      - going
      - core

# ── ROUTES ───────────────────────────────────────────────────
routes:
  # Public auth routes — no JWT required
  - name: auth-routes
    service: going-api-gateway
    paths:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
    methods:
      - POST
    strip_path: false
    tags:
      - public

  # Health check — no auth
  - name: health-check
    service: going-api-gateway
    paths:
      - /health
      - /ready
    methods:
      - GET
    strip_path: false

  # All protected API routes — JWT required
  - name: api-routes
    service: going-api-gateway
    paths:
      - /api
    strip_path: false
    tags:
      - protected

  # Swagger docs — restrict to internal networks
  - name: docs-route
    service: going-api-gateway
    paths:
      - /docs
    strip_path: false
    tags:
      - internal

# ── PLUGINS ──────────────────────────────────────────────────
plugins:
  # ── Global rate limiting ──────────────────────────────────
  - name: rate-limiting
    config:
      minute: 1000
      hour: 50000
      policy: redis
      redis_host: redis
      redis_port: 6379
      hide_client_headers: false
      error_message: "Too many requests — please slow down"
    enabled: true
    tags:
      - global

  # ── Stricter rate limit on auth routes ───────────────────
  - name: rate-limiting
    route: auth-routes
    config:
      minute: 10
      policy: redis
      redis_host: redis
      redis_port: 6379
      error_message: "Too many auth attempts"
    enabled: true

  # ── JWT verification on all protected routes ─────────────
  - name: jwt
    route: api-routes
    config:
      key_claim_name: sub
      claims_to_verify:
        - exp
      header_names:
        - Authorization
      uri_param_names: []
    enabled: true

  # ── CORS (global) ─────────────────────────────────────────
  - name: cors
    config:
      origins:
        - https://going.app
        - https://dashboard.going.app
        - https://staging.going.app
        - http://localhost:3000
        - http://localhost:3001
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-Requested-With
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
      credentials: true
      max_age: 3600
    enabled: true

  # ── Request ID injection ──────────────────────────────────
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true
    enabled: true

  # ── Bot detection ─────────────────────────────────────────
  - name: bot-detection
    config:
      deny:
        - "*(Googlebot|Slurp|Yahoo! Slurp|ia_archiver)*"
    enabled: true

  # ── Response caching for GET routes ──────────────────────
  - name: proxy-cache
    config:
      response_code:
        - 200
      request_method:
        - GET
        - HEAD
      content_type:
        - application/json
      cache_ttl: 30
      strategy: memory
    enabled: true

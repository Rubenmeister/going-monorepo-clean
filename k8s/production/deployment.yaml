# ══════════════════════════════════════════════════════════════════
# GOING PLATFORM — Production Deployments
# 15 microservices + HPAs + Ingress
# ══════════════════════════════════════════════════════════════════

# ── API GATEWAY (Tier 1 — high resources, HPA) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: going-production
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: api-gateway
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          image: ghcr.io/rubenmeister/going-monorepo-clean/api-gateway:main
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: going-secrets
            - configMapRef:
                name: production-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: gcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: going-production
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---

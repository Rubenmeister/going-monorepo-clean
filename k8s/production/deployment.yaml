---
# ── HORIZONTAL POD AUTOSCALING ───────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: going-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transport-hpa
  namespace: going-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transport-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ── PRODUCTION INGRESS ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: going-production-ingress
  namespace: going-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
spec:
  tls:
    - hosts:
        - going.app
        - dashboard.going.app
      secretName: going-production-tls
  rules:
    - host: going.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
    - host: dashboard.going.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
---
# ── SECRETS (use Sealed Secrets or Vault in real prod) ───────
apiVersion: v1
kind: Secret
metadata:
  name: going-secrets
  namespace: going-production
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_SEALED_SECRET"
  REDIS_URL: "REPLACE_WITH_SEALED_SECRET"
  JWT_SECRET: "REPLACE_WITH_SEALED_SECRET"
  SENTRY_DSN: "REPLACE_WITH_SEALED_SECRET"

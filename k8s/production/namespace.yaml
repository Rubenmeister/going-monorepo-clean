apiVersion: v1
kind: Namespace
metadata:
  name: going-production
  labels:
    environment: production
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "Production environment for Going Platform"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: going-production
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "200"
    services: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: going-production
spec:
  limits:
  - max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "1000m"
      memory: "1Gi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "8"
      memory: "8Gi"
    min:
      cpu: "200m"
      memory: "256Mi"
    type: Pod

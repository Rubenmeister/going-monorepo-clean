apiVersion: v1
kind: ConfigMap
metadata:
  name: production-config
  namespace: going-production
  labels:
    app: going-platform
    environment: production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "warn"
  SERVICE_DISCOVERY: "kubernetes"

  # API Gateway
  API_GATEWAY_PORT: "3000"
  API_GATEWAY_HOST: "0.0.0.0"
  CORS_ORIGINS: "https://going.app,https://dashboard.going.app,https://goingec.com,https://www.goingec.com,https://app.goingec.com,https://admin.goingec.com"
  API_RATE_LIMIT: "200"
  API_RATE_LIMIT_WINDOW: "1m"
  RATE_LIMIT_ENABLED: "true"

  # Database
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "going-production"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DATABASE: "0"

  # Elasticsearch
  ELASTICSEARCH_HOST: "elasticsearch"
  ELASTICSEARCH_PORT: "9200"
  ELASTICSEARCH_INDEX: "going-production"

  # Logging
  LOGSTASH_HOST: "logstash"
  LOGSTASH_PORT: "5000"

  # Observability
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  METRICS_ENABLED: "true"
  TRACES_ENABLED: "true"

  # Feature Flags
  FEATURE_ADVANCED_BOOKING: "true"
  FEATURE_PAYMENT_METHODS: "true"
  FEATURE_REAL_TIME_TRACKING: "true"
  FEATURE_ANALYTICS: "true"

  # Payment (LIVE — requires real Stripe keys in secrets)
  PAYMENT_MODE: "live"

  # Notifications
  NOTIFICATIONS_ENABLED: "true"
  EMAIL_PROVIDER: "sendgrid"
  SMS_PROVIDER: "twilio"

  # Session
  SESSION_TIMEOUT: "1800"
  TOKEN_EXPIRATION: "43200"

  # Ingress
  INGRESS_HOST: "going.app"
  INGRESS_TLS_ENABLED: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: going-production
  labels:
    app: prometheus
    environment: production
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        environment: production
        cluster: gke-production

    scrape_configs:
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [going-production]
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: going-production
  labels:
    app: nginx-ingress
    environment: production
data:
  client_max_body_size: "50m"
  proxy_connect_timeout: "60"
  proxy_send_timeout: "60"
  proxy_read_timeout: "60"
  proxy_buffering: "on"

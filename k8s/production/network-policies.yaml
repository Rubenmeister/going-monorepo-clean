# Standard backend services (DB-only egress)
# Billing, Experiencias, Tours, Anfitriones, Voice, Analytics, Ratings, Envios
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-standard-services-ingress
  namespace: going-production
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - billing-service
          - experiencias-service
          - tours-service
          - anfitriones-service
          - voice-service
          - analytics-service
          - ratings-service
          - envios-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:

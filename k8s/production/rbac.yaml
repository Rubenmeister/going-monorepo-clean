# ── ROLES ─────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: going-platform-role
  namespace: going-production
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-service-role
  namespace: going-production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["going-secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["production-config"]
  verbs: ["get"]
---
# ── ROLE BINDINGS ─────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: going-platform-rolebinding
  namespace: going-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: going-platform-role
subjects:
- kind: ServiceAccount
  name: going-platform
  namespace: going-production
- kind: ServiceAccount
  name: api-gateway
  namespace: going-production
- kind: ServiceAccount
  name: user-auth-service
  namespace: going-production
- kind: ServiceAccount
  name: booking-service
  namespace: going-production
- kind: ServiceAccount
  name: transport-service
  namespace: going-production
- kind: ServiceAccount
  name: tracking-service
  namespace: going-production
- kind: ServiceAccount
  name: notifications-service
  namespace: going-production
- kind: ServiceAccount
  name: billing-service
  namespace: going-production
- kind: ServiceAccount
  name: experiencias-service
  namespace: going-production
- kind: ServiceAccount
  name: tours-service
  namespace: going-production
- kind: ServiceAccount
  name: anfitriones-service
  namespace: going-production
- kind: ServiceAccount
  name: voice-service
  namespace: going-production
- kind: ServiceAccount
  name: analytics-service
  namespace: going-production
- kind: ServiceAccount
  name: ratings-service
  namespace: going-production
- kind: ServiceAccount
  name: envios-service
  namespace: going-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-service-rolebinding
  namespace: going-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: payment-service-role
subjects:
- kind: ServiceAccount
  name: payment-service
  namespace: going-production
---
# ── PROMETHEUS CLUSTER ROLE ───────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: going-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-production
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-production
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: going-production
---
# ── POD DISRUPTION BUDGETS ────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-auth-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: user-auth-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: payment-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: booking-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: booking-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tracking-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: tracking-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transport-pdb
  namespace: going-production
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: transport-service

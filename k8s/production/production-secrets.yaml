# ┌────────────────────────────────────────────────────────────────┐
# │  PRODUCTION SECRETS — DO NOT commit real values to git.       │
# │                                                                │
# │  Option A: Replace with kubeseal (Sealed Secrets)              │
# │    kubeseal --format=yaml < secret.yaml > sealed-secret.yaml   │
# │                                                                │
# │  Option B: Use GCP Secret Manager + External Secrets Operator  │
# │    Install: helm install external-secrets external-secrets/... │
# │    Then use ExternalSecret resources instead of this file.     │
# │                                                                │
# │  Option C: Manual kubectl apply (not GitOps-friendly)          │
# │    kubectl create secret generic going-secrets \               │
# │      --from-literal=DATABASE_URL=mongodb://... \               │
# │      -n going-production                                       │
# └────────────────────────────────────────────────────────────────┘
apiVersion: v1
kind: Secret
metadata:
  name: going-secrets
  namespace: going-production
  labels:
    app: going-platform
    environment: production
type: Opaque
stringData:
  # Database
  DATABASE_URL: "REPLACE_BEFORE_DEPLOY"
  MONGODB_URI: "REPLACE_BEFORE_DEPLOY"

  # Cache
  REDIS_URL: "REPLACE_BEFORE_DEPLOY"

  # Auth
  JWT_SECRET: "REPLACE_BEFORE_DEPLOY"

  # Observability
  SENTRY_DSN: "REPLACE_BEFORE_DEPLOY"

  # Payment (Stripe LIVE keys)
  STRIPE_SECRET_KEY: "REPLACE_BEFORE_DEPLOY"
  STRIPE_PUBLISHABLE_KEY: "REPLACE_BEFORE_DEPLOY"
  STRIPE_WEBHOOK_SECRET: "REPLACE_BEFORE_DEPLOY"

  # Notifications
  TWILIO_ACCOUNT_SID: "REPLACE_BEFORE_DEPLOY"
  TWILIO_AUTH_TOKEN: "REPLACE_BEFORE_DEPLOY"
  SENDGRID_API_KEY: "REPLACE_BEFORE_DEPLOY"

  # Elasticsearch
  ELASTICSEARCH_NODE: "REPLACE_BEFORE_DEPLOY"
  ELASTIC_PASSWORD: "REPLACE_BEFORE_DEPLOY"
---
apiVersion: v1
kind: Secret
metadata:
  name: gcr-secret
  namespace: going-production
type: kubernetes.io/dockercfg
data:
  .dockercfg: ""
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ SERVICE_NAME }}
  labels:
    app: {{ SERVICE_NAME }}
    version: v1
spec:
  replicas: {{ REPLICAS | default: 2 }}
  selector:
    matchLabels:
      app: {{ SERVICE_NAME }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ SERVICE_NAME }}
        version: v1
    spec:
      serviceAccountName: {{ SERVICE_NAME }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: {{ SERVICE_NAME }}
        image: {{ DOCKER_REGISTRY }}/{{ SERVICE_NAME }}:{{ IMAGE_TAG | default: 'latest' }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: {{ PORT }}
          protocol: TCP

        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "{{ PORT }}"
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: {{ SERVICE_NAME }}-config
              key: cors-origins
        - name: LOG_LEVEL
          value: "info"
        # Database URLs
        - name: {{ SERVICE_NAME | upper }}_DB_URL
          valueFrom:
            secretKeyRef:
              name: {{ SERVICE_NAME }}-secrets
              key: db-url
        # JWT Secret
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ SERVICE_NAME }}-secrets
              key: jwt-secret

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /readiness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        # Volume mounts for temp files
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      # Pod disruption budget
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ SERVICE_NAME }}
              topologyKey: kubernetes.io/hostname

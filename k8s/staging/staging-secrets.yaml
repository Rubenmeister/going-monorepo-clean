apiVersion: v1
kind: Secret
metadata:
  name: gcr-secret
  namespace: staging
type: kubernetes.io/dockercfg
data:
  # This will be populated by the setup script
  # Format: {"gcr.io":{"auth":"<base64-encoded-json-key>","email":"<email>"}}
  .dockercfg: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: staging
type: Opaque
stringData:
  # JWT Configuration
  JWT_SECRET: "your-staging-jwt-secret-change-in-production"

  # Database URLs
  MONGODB_URI: "mongodb://mongodb:27017/going-staging"

  # Redis Configuration
  REDIS_URL: "redis://redis:6379/0"

  # Elasticsearch
  ELASTICSEARCH_NODE: "http://elasticsearch:9200"
  ELASTIC_PASSWORD: "ElasticPassword123!"
  ELASTICSEARCH_USERNAME: "elastic"

  # API Keys (Staging)
  STRIPE_SECRET_KEY: "sk_test_staging_key"
  TWILIO_AUTH_TOKEN: "staging_token"

  # Environment specific
  NODE_ENV: "staging"
---
apiVersion: v1
kind: Secret
metadata:
  name: gcp-credentials
  namespace: staging
type: Opaque
stringData:
  # GCP service account key will be populated by setup script
  # This should contain the JSON key from your GCP service account
  gcp-sa-key.json: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project-id",
      "private_key_id": "key-id",
      "private_key": "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n",
      "client_email": "service-account@your-project.iam.gserviceaccount.com",
      "client_id": "123456789",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/service-account%40your-project.iam.gserviceaccount.com"
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: going-platform
  namespace: staging
  labels:
    app: going-platform
    environment: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: staging
  labels:
    app: api-gateway
    environment: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service
  namespace: staging
  labels:
    app: booking-service
    environment: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service
  namespace: staging
  labels:
    app: payment-service
    environment: staging
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corporate-portal
  namespace: staging
  labels:
    app: corporate-portal
    environment: staging

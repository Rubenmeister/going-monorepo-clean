apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-portal
  namespace: staging
  labels:
    app: corporate-portal
    version: v1
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: corporate-portal
        version: v1
        environment: staging
    spec:
      serviceAccountName: corporate-portal
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
        fsGroup: 101
      containers:
      - name: corporate-portal
        image: gcr.io/GCP_PROJECT/corporate-portal:IMAGE_TAG
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP

        env:
        - name: NODE_ENV
          value: "staging"
        - name: PORT
          value: "80"
        - name: REACT_APP_API_URL
          value: "https://api.staging.going.com"
        - name: REACT_APP_ENVIRONMENT
          value: "staging"

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}

      # Pod affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - corporate-portal
              topologyKey: kubernetes.io/hostname

      # Image pull secrets
      imagePullSecrets:
      - name: gcr-secret

      # Termination grace period
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: corporate-portal
  namespace: staging
  labels:
    app: corporate-portal
    environment: staging
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: corporate-portal
  sessionAffinity: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-portal-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: corporate-portal
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

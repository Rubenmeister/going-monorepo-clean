---
# ── BOOKING SERVICE ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: going-staging
  labels:
    app: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: ghcr.io/rubenmeister/going-monorepo-clean/booking-service:develop
          ports:
            - containerPort: 3010
          env:
            - name: PORT
              value: "3010"
            - name: NODE_ENV
              value: staging
          envFrom:
            - secretRef:
                name: going-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

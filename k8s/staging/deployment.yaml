apiVersion: v1
kind: Namespace
metadata:
  name: going-staging
  labels:
    environment: staging
    app.kubernetes.io/managed-by: argocd
---
# ── USER AUTH SERVICE ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-auth-service
  namespace: going-staging
  labels:
    app: user-auth-service
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-auth-service
  template:
    metadata:
      labels:
        app: user-auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: user-auth-service
          image: ghcr.io/rubenmeister/going-monorepo-clean/user-auth-service:develop
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: staging
          envFrom:
            - secretRef:
                name: going-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-auth-service
  namespace: going-staging
spec:
  selector:
    app: user-auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
# ── API GATEWAY ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: going-staging
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/rubenmeister/going-monorepo-clean/api-gateway:develop
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: staging
            - name: CORS_ORIGINS
              value: "https://staging.going.app,https://dashboard.staging.going.app"
          envFrom:
            - secretRef:
                name: going-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: going-staging
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
---

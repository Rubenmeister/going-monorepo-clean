---
# ── INGRESS ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: going-staging-ingress
  namespace: going-staging
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
    - hosts:
        - staging.going.app
        - dashboard.staging.going.app
      secretName: going-staging-tls
  rules:
    - host: staging.going.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
    - host: dashboard.staging.going.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
---
# ── SHARED SECRETS (placeholder — fill via kubectl or sealed-secrets) ──
apiVersion: v1
kind: Secret
metadata:
  name: going-secrets
  namespace: going-staging
type: Opaque
stringData:
  DATABASE_URL: "postgresql://going:CHANGE_ME@postgres:5432/going_staging"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "CHANGE_ME_STAGING_JWT_SECRET"
  SENTRY_DSN: ""

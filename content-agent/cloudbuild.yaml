# content-agent — Cloud Run Job (cron-triggered) deployment
#
# Build context: monorepo ROOT — el Dockerfile genérico
# `Dockerfile.cloudrun-agent` necesita acceso a pnpm-workspace.yaml,
# pnpm-lock.yaml, libs/cerebro-contracts y content-agent/ todos juntos.
#
# Trigger:
#   gcloud builds submit . --config=content-agent/cloudbuild.yaml --project=going-5d1ae
#
# Schedule (Cloud Scheduler): lunes 9am Ecuador (tip semanal + reporte).
# Vars seteadas fuera de Cloud Build (vía gcloud run jobs update --update-env-vars):
#   CEREBRO_PUBLISH_ENABLED=true|false  (default false hasta que cerebro-service esté listo)
#   CONTENT_TELEGRAM_CHAT_ID            (chat público del tip; si vacío cae a TELEGRAM_CHAT_ID)

steps:
  # 1. Build con Dockerfile genérico de agentes, contexto = monorepo root.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.cloudrun-agent
      - --build-arg
      - AGENT_NAME=content-agent
      - -t
      - gcr.io/$PROJECT_ID/content-agent:latest
      - .
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/content-agent:latest']

  # 2. Deploy como Cloud Run Job.
  #
  # Secrets:
  #   ANTHROPIC_API_KEY  — Claude Sonnet 4.5 para tip semanal público
  #   GMAIL_APP_PASSWORD — alertas internas (ops) por nodemailer
  #   TELEGRAM_BOT_TOKEN — bot que publica el tip al canal público
  #   TELEGRAM_CHAT_ID   — chat ops (fallback de CONTENT_TELEGRAM_CHAT_ID)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - content-agent
      - --image=gcr.io/$PROJECT_ID/content-agent:latest
      - --region=us-central1
      - --cpu=1
      - --memory=512Mi
      - --task-timeout=300s
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,PEXELS_API_KEY=PEXELS_API_KEY:latest
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GMAIL_FROM=goingappecuador@gmail.com,NOTIFICATION_EMAIL=goingappecuador@gmail.com,AI_TIP_MODEL=claude-sonnet-4-5,CEREBRO_PUBLISH_ENABLED=true,CONTENT_MEDIA_BUCKET=going-content-media,CONTENT_DEFAULT_COVER=https://storage.googleapis.com/going-content-media/defaults/going-default.jpg
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # 3. Schedule lunes 9am Ecuador.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe content-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http content-agent-trigger \
            --location=us-central1 \
            --schedule="0 9 * * 1" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/content-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http content-agent-trigger \
            --location=us-central1 \
            --schedule="0 9 * * 1" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/content-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/content-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1500s'

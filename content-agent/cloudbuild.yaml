steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [build, -t, gcr.io/$PROJECT_ID/content-agent:latest, .]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/content-agent:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - content-agent
      - --image=gcr.io/$PROJECT_ID/content-agent:latest
      - --region=us-central1
      - --cpu=1
      - --memory=512Mi
      - --task-timeout=300s
      # Secrets:
      #   ANTHROPIC_API_KEY  — Claude Sonnet 4.5 para el tip semanal público
      #   GMAIL_APP_PASSWORD — alertas internas (ops) por nodemailer
      #   TELEGRAM_BOT_TOKEN — bot que publica el tip al canal público
      #   TELEGRAM_CHAT_ID   — chat de ops (fallback de CONTENT_TELEGRAM_CHAT_ID)
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest
      # Single --set-env-vars consolidado (multiple flags pisan el anterior).
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GMAIL_FROM=goingappecuador@gmail.com,NOTIFICATION_EMAIL=rubenmeister@gmail.com,AI_TIP_MODEL=claude-sonnet-4-5
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        # Lunes 9am Ecuador: tip semanal + reporte interno.
        # Ya no corre 4 veces al día sin razón — el único loop útil
        # es semanal. Cuando se use el CMS las alertas de revisión
        # se chequean en ese mismo run del lunes.
        gcloud scheduler jobs describe content-agent-trigger \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null && \
        gcloud scheduler jobs update http content-agent-trigger \
          --location=us-central1 \
          --schedule="0 9 * * 1" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/content-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID || \
        gcloud scheduler jobs create http content-agent-trigger \
          --location=us-central1 \
          --schedule="0 9 * * 1" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/content-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

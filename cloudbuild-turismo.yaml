steps:
  # Build tours-service Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'SERVICE_NAME=tours-service'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tours-service:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tours-service:latest'
      - '-f'
      - 'Dockerfile.cloudrun-service'
      - '.'
    timeout: '1800s'

  # Push versioned tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tours-service:$BUILD_ID']

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tours-service:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tours-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tours-service:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '60'

images:
  - 'gcr.io/$PROJECT_ID/tours-service:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/tours-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

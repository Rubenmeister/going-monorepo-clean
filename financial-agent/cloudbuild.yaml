steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [build, -t, gcr.io/$PROJECT_ID/financial-agent:latest, .]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/financial-agent:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - financial-agent
      - --image=gcr.io/$PROJECT_ID/financial-agent:latest
      - --region=us-central1
      - --cpu=1
      - --memory=512Mi
      - --task-timeout=300s
      # Secrets gestionados por Cloud Build:
      #   DATIL_API_KEY        — facturación electrónica Datil
      #   DATIL_CERT_PASSWORD  — password del certificado .p12 SRI
      #   GOING_RUC            — RUC empresa (13 dígitos)
      #   GMAIL_APP_PASSWORD   — app-password Gmail SMTP para notificaciones
      #   MONGO_URL-prod       — Mongo Atlas
      #
      # NO se inyectan: ANTHROPIC_API_KEY (migrado a Gemini Vertex via SA),
      # TELEGRAM_BOT_TOKEN/CHAT_ID (alertas salen por Gmail, no Telegram).
      - --set-secrets=DATIL_API_KEY=DATIL_API_KEY:latest,DATIL_CERT_PASSWORD=DATIL_CERT_PASSWORD:latest,GOING_RUC=GOING_RUC:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,MONGO_URL=MONGO_URL-prod:latest
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_REGION=us-central1,DATIL_ENV=1,GMAIL_FROM=goingappecuador@gmail.com,NOTIFICATION_EMAIL=rubenmeister@gmail.com,AI_ANALYSIS_MODEL=gemini-2.5-flash
      - --vpc-connector=going-connector
      - --vpc-egress=all-traffic
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        # Schedule en hora Ecuador (America/Guayaquil = UTC-5).
        # Dispara en las horas que el monitor evalúa internamente:
        #   08:00 conciliación día anterior + invoicing loop
        #   09:00 lunes payouts semanales / día 1 mes reporte SRI / invoicing
        #   12:00 análisis IA + invoicing
        #   20:00 reporte diario + payouts diarios + reconciliation
        gcloud scheduler jobs describe financial-agent-monitor \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null && \
        gcloud scheduler jobs update http financial-agent-monitor \
          --location=us-central1 \
          --schedule="0 8,9,12,20 * * *" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/financial-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID || \
        gcloud scheduler jobs create http financial-agent-monitor \
          --location=us-central1 \
          --schedule="0 8,9,12,20 * * *" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/financial-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

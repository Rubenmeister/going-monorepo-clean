steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [build, -t, gcr.io/$PROJECT_ID/financial-agent:latest, .]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/financial-agent:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - financial-agent
      - --image=gcr.io/$PROJECT_ID/financial-agent:latest
      - --region=us-central1
      - --cpu=1
      - --memory=512Mi
      - --task-timeout=300s
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,DATIL_API_KEY=DATIL_API_KEY:latest,DATIL_CERT_PASSWORD=DATIL_CERT_PASSWORD:latest,GOING_RUC=GOING_RUC:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,MONGO_URL=MONGO_URL-prod:latest
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,DATIL_ENV=2,GMAIL_FROM=goingappecuador@gmail.com,NOTIFICATION_EMAIL=rubenmeister@gmail.com
      - --vpc-connector=going-connector
      - --vpc-egress=all-traffic
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe financial-agent-monitor \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null && \
        gcloud scheduler jobs update http financial-agent-monitor \
          --location=us-central1 \
          --schedule="0 */6 * * *" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/financial-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID || \
        gcloud scheduler jobs create http financial-agent-monitor \
          --location=us-central1 \
          --schedule="0 */6 * * *" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/financial-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

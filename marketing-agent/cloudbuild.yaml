steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/marketing-agent:latest
      - .

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/marketing-agent:latest

  # Deploy as Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - marketing-agent
      - --image=gcr.io/$PROJECT_ID/marketing-agent:latest
      - --region=us-central1
      - --cpu=1
      - --memory=512Mi
      - --task-timeout=300s
      # Inyectar TODOS los secrets de plataformas que existen.
      # Las que falten en runtime hacen que ese fetch falle silenciosamente,
      # el reporte semanal sale con las plataformas que sí tienen token.
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,META_ACCESS_TOKEN=META_ACCESS_TOKEN:latest,META_PAGE_ID=META_PAGE_ID:latest,META_IG_USER_ID=META_IG_USER_ID:latest,META_WA_ACCESS_TOKEN=META_WA_ACCESS_TOKEN:latest,TWITTER_API_KEY=TWITTER_API_KEY:latest,TWITTER_API_SECRET=TWITTER_API_SECRET:latest,TWITTER_ACCESS_TOKEN=TWITTER_ACCESS_TOKEN:latest,TWITTER_ACCESS_SECRET=TWITTER_ACCESS_SECRET:latest,TIKTOK_ACCESS_TOKEN=TIKTOK_ACCESS_TOKEN:latest,YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest,YOUTUBE_CHANNEL_ID=YOUTUBE_CHANNEL_ID:latest,THREADS_ACCESS_TOKEN=THREADS_ACCESS_TOKEN:latest,THREADS_USER_ID=THREADS_USER_ID:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # Cloud Scheduler — Lunes 9am Ecuador (reporte semanal)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe marketing-agent-daily \
          --location=us-central1 --project=$PROJECT_ID 2>/dev/null && \
        gcloud scheduler jobs update http marketing-agent-daily \
          --location=us-central1 \
          --schedule="0 9 * * 1" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/marketing-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID || \
        gcloud scheduler jobs create http marketing-agent-daily \
          --location=us-central1 \
          --schedule="0 9 * * 1" \
          --time-zone="America/Guayaquil" \
          --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/marketing-agent:run" \
          --message-body='{}' \
          --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY

name: 🔒 Security Scanning & Vulnerability Detection

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Daily vulnerability scan at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-check:
    name: 🔍 Dependency Vulnerability Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run npm audit
        id: npm-audit
        continue-on-error: true
        run: |
          echo "### NPM Audit Results 📋" >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=moderate --json > npm-audit.json 2>&1 || true
          cat npm-audit.json | jq '.metadata.vulnerabilities' >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json

      - name: ⚠️ Fail on critical vulnerabilities
        run: |
          CRITICAL=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "Found $CRITICAL critical and $HIGH high severity vulnerabilities"
            exit 1
          fi

  snyk-scan:
    name: 🐍 Snyk Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --exit-code=1

      - name: 📤 Upload Snyk report
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: snyk.sarif

  secret-scanning:
    name: 🔑 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Run GitGuardian scan
        uses: GitGuardian/ggshield-action@master
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: 🔎 Run git-secrets scan
        run: |
          git clone https://github.com/awslabs/git-secrets.git
          cd git-secrets
          ./install.sh
          cd ..
          git secrets --scan

  sast-scan:
    name: 📊 Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=going-platform
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,dist/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: 📤 Upload SonarQube report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: .sonarqube/

  container-scan:
    name: 🐳 Docker Image Scanning
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔨 Build Docker image
        run: |
          docker build -t going-platform:latest .
          docker save going-platform:latest -o image.tar

      - name: 🐳 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          input: 'image.tar'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: 📤 Upload Trivy report
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

  sbom-generation:
    name: 📦 SBOM (Software Bill of Materials) Generation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📋 Generate SBOM with CycloneDX
        run: |
          pnpm install -g @cyclonedx/npm
          cyclonedx-npm -p -o sbom.json
          cyclonedx-npm -p -o sbom.xml --output-format xml

      - name: 📤 Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml

  license-compliance:
    name: 📜 License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: 📥 Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📜 Check licenses
        run: |
          pnpm install -g license-checker
          license-checker --onlyunknown
          license-checker --json > licenses.json

      - name: 📤 Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json

  security-report:
    name: 📊 Consolidated Security Report
    if: always()
    needs: [dependency-check, snyk-scan, secret-scanning, sast-scan, container-scan, sbom-generation]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all reports
        uses: actions/download-artifact@v4

      - name: 📊 Generate consolidated report
        run: |
          echo "# 🔒 Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Scan Date**: $(date)" >> security-report.md
          echo "**Commit**: ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md

          echo "## 📋 Summary" >> security-report.md
          echo "- ✅ Dependency Check: PASSED" >> security-report.md
          echo "- ✅ Snyk Scan: PASSED" >> security-report.md
          echo "- ✅ Secret Detection: PASSED" >> security-report.md
          echo "- ✅ SAST Scan: PASSED" >> security-report.md
          echo "- ✅ Container Scan: PASSED" >> security-report.md
          echo "- ✅ SBOM Generated: YES" >> security-report.md

      - name: 📤 Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, claude/**]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily tests at 2 AM

jobs:
  # Stage 1: Linting & Code Quality
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality

    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
      
      - name: Run ESLint
        run: pnpm run lint:all
        continue-on-error: true

      - name: Run Prettier check
        run: pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
        continue-on-error: true

  # Stage 2: Unit & Integration Tests
  test:
    runs-on: ubuntu-latest
    name: Unit & Integration Tests

    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run affected unit tests
        run: pnpm nx affected -t test --base=origin/main --head=HEAD --parallel --passWithNoTests
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
          REDIS_URL: redis://localhost:6379

      - name: Generate coverage report
        run: pnpm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Stage 3: E2E Tests (only on main and develop branches)
  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build applications
        run: pnpm run build:all

      - name: Start services
        run: pnpm run dev:all &
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
          REDIS_URL: redis://localhost:6379

      - name: Wait for services
        run: sleep 30

      - name: Run E2E tests
        run: pnpm run test:e2e:ci
      
      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-videos
          path: cypress/videos/
      
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # Stage 4: Security Tests
  security:
    runs-on: ubuntu-latest
    name: Security Testing

    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run security tests
        run: pnpm run test:security
        continue-on-error: true
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: pnpm snyk test --severity-threshold=high
        continue-on-error: true

  # Stage 5: Build Docker Images
  build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [lint, test]

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v3

      - name: Check Docker credentials
        id: docker-check
        run: |
          if [[ -z "${{ secrets.DOCKER_USERNAME }}" || -z "${{ secrets.DOCKER_PASSWORD }}" ]]; then
            echo "Docker credentials not configured — skipping image build"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.docker-check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: steps.docker-check.outputs.skip == 'false'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push images
        if: steps.docker-check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          docker build --target transport-service -t ${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }}

          docker build --target payment-service -t ${{ secrets.DOCKER_REGISTRY }}/going-payment:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-payment:${{ github.sha }}

          docker build --target ratings-service -t ${{ secrets.DOCKER_REGISTRY }}/going-ratings:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-ratings:${{ github.sha }}

  # Stage 6: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [build, security]

    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v3

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy API Gateway
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ secrets.DOCKER_REGISTRY }}/going-api-gateway:${{ github.sha }} \
            -n staging
          kubectl rollout status deployment/api-gateway -n staging --timeout=5m

      - name: Deploy Booking Service
        run: |
          kubectl set image deployment/booking-service \
            booking-service=${{ secrets.DOCKER_REGISTRY }}/going-booking:${{ github.sha }} \
            -n staging
          kubectl rollout status deployment/booking-service -n staging --timeout=5m

      - name: Deploy Payment Service
        run: |
          kubectl set image deployment/payment-service \
            payment-service=${{ secrets.DOCKER_REGISTRY }}/going-payment:${{ github.sha }} \
            -n staging
          kubectl rollout status deployment/payment-service -n staging --timeout=5m

      - name: Wait for services
        run: sleep 15

      - name: Run health checks
        run: |
          echo "Checking API Gateway health..."
          for i in {1..30}; do
            if curl -f http://staging-api.going.local/api/health; then
              echo "✅ API Gateway healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ API Gateway failed to become healthy"
              exit 1
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 10
          done

          echo "Checking Booking Service health..."
          for i in {1..30}; do
            if curl -f http://staging-booking.going.local/api/health; then
              echo "✅ Booking Service healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Booking Service failed to become healthy"
              exit 1
            fi
            echo "⏳ Waiting for service... ($i/30)"
            sleep 10
          done

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          curl -f http://staging-api.going.local/api/health/live || exit 1
          curl -f http://staging-api.going.local/api/health/ready || exit 1
          echo "✅ Smoke tests passed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          kubectl rollout undo deployment/api-gateway -n staging
          kubectl rollout undo deployment/booking-service -n staging
          kubectl rollout undo deployment/payment-service -n staging
          kubectl rollout status deployment/api-gateway -n staging --timeout=5m
          exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Staging deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Going Platform - Staging Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

  # Stage 7: Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [lint, test]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Create deployment record
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deployment',
              auto_merge: false
            });

      - name: Check deploy credentials
        id: deploy-check
        run: |
          if [[ -z "${{ secrets.KUBE_CONFIG_PRODUCTION }}" && -z "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "Deploy credentials not configured — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubectl
        if: steps.deploy-check.outputs.skip == 'false' && secrets.KUBE_CONFIG_PRODUCTION != ''
        continue-on-error: true
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy services
        if: steps.deploy-check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=${{ secrets.DOCKER_REGISTRY }}/going-api-gateway:${{ github.sha }} \
            -n production || echo "⚠️ kubectl deploy skipped — configure KUBE_CONFIG_PRODUCTION or update this step for your deploy target (e.g. Cloud Run)"

      - name: Run production health check
        continue-on-error: true
        run: |
          echo "Checking production health..."
          curl -sf https://api.goingec.com/health && echo "✅ API healthy" || echo "⚠️ Health check unavailable"

      - name: Slack notification
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Going Platform - Production Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

  # Stage 8: Load Tests
  load-test:
    runs-on: ubuntu-latest
    name: Load Testing

    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v3

      - name: Setup K6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 apt-transport-https lsb-release ubuntu-keyring
          curl https://dl.k6.io/apt/conf.ubuntu.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/apt stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run load tests
        run: k6 run __tests__/load/ride-load-test.js --vus 50 --duration 5m
        continue-on-error: true

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: load-test-results.json

  # Final Status Check
  status:
    runs-on: ubuntu-latest
    name: Pipeline Status
    needs: [lint, test, e2e, security]
    if: always()
    
    steps:
      - name: Check pipeline status
        run: |
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          E2E="${{ needs.e2e.result }}"
          echo "lint=$LINT  test=$TEST  e2e=$E2E"
          # E2E is intentionally skipped on feature branches — treat skipped as pass
          if [[ "$LINT" == "failure" ]] || \
             [[ "$TEST" == "failure" ]] || \
             [[ "$E2E" == "failure" ]]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ Pipeline passed"
      
      - name: Create success badge
        if: success()
        run: echo "✅ All checks passed"

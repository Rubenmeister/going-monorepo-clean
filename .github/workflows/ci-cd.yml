name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, claude/**]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily tests at 2 AM

jobs:
  # Stage 1: Linting & Code Quality
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint:all
        continue-on-error: true
      
      - name: Run Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
        continue-on-error: true

  # Stage 2: Unit & Integration Tests
  test:
    runs-on: ubuntu-latest
    name: Unit & Integration Tests
    
    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
          REDIS_URL: redis://localhost:6379
      
      - name: Run integration tests
        run: npm run test:integration
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
          REDIS_URL: redis://localhost:6379
      
      - name: Generate coverage report
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Stage 3: E2E Tests
  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests
    
    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build applications
        run: npm run build:all
      
      - name: Start services
        run: npm run dev:all &
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
          REDIS_URL: redis://localhost:6379
      
      - name: Wait for services
        run: sleep 30
      
      - name: Run E2E tests
        run: npm run test:e2e:ci
      
      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-videos
          path: cypress/videos/
      
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # Stage 4: Security Tests
  security:
    runs-on: ubuntu-latest
    name: Security Testing
    
    services:
      mongodb:
        image: mongo:5.0
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security tests
        run: npm run test:security
        continue-on-error: true
        env:
          MONGO_URI: mongodb://localhost:27017/going_platform_test
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Check for vulnerable dependencies
        run: npx snyk test --severity-threshold=high
        continue-on-error: true

  # Stage 5: Build Docker Images
  build:
    runs-on: ubuntu-latest
    name: Build Docker Images
    needs: [lint, test]
    
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push images
        run: |
          docker build --target transport-service -t ${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }}
          
          docker build --target payment-service -t ${{ secrets.DOCKER_REGISTRY }}/going-payment:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-payment:${{ github.sha }}
          
          docker build --target ratings-service -t ${{ secrets.DOCKER_REGISTRY }}/going-ratings:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_REGISTRY }}/going-ratings:${{ github.sha }}

  # Stage 6: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [build, security]
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands
          # kubectl set image deployment/transport-service transport-service=${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }} -n staging
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # curl -f http://staging.going.com/api/health || exit 1
      
      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Staging deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Going Platform - Staging Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # Stage 7: Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build]
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Create deployment
        uses: actions/github-script@v6
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deployment',
              auto_merge: false
            });
      
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add actual production deployment commands
          # kubectl set image deployment/transport-service transport-service=${{ secrets.DOCKER_REGISTRY }}/going-transport:${{ github.sha }} -n production
      
      - name: Health check
        run: |
          echo "Running health checks..."
          # for i in {1..5}; do
          #   curl -f https://api.going.com/api/health && break || sleep 10
          # done
      
      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Going Platform - Production Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }

  # Stage 8: Load Tests
  load-test:
    runs-on: ubuntu-latest
    name: Load Testing
    
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup K6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 apt-transport-https lsb-release ubuntu-keyring
          curl https://dl.k6.io/apt/conf.ubuntu.gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/apt stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Run load tests
        run: k6 run __tests__/load/ride-load-test.js --vus 50 --duration 5m
        continue-on-error: true
      
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: load-test-results.json

  # Final Status Check
  status:
    runs-on: ubuntu-latest
    name: Pipeline Status
    needs: [lint, test, e2e, security]
    if: always()
    
    steps:
      - name: Check pipeline status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "Pipeline failed"
            exit 1
          fi
          echo "Pipeline passed"
      
      - name: Create success badge
        if: success()
        run: echo "✅ All checks passed"

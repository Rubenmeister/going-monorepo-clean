name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes 06:00 UTC (1am Ecuador) — barrido semanal
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: pnpm audit + outdated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Audit (high severity, fail on critical)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Outdated report (informativo)
        run: pnpm outdated || true

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # BLOQUEANTE: si detecta un secreto real, el job FALLA y corta el merge.
      # Los falsos positivos conocidos (config Firebase pública, placeholders de
      # dev) están silenciados en .gitleaks.toml. En pull_request/push escanea
      # solo los commits nuevos; en el cron semanal escanea todo el historial.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript,typescript'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install + build (best-effort)
        run: pnpm install --frozen-lockfile && pnpm run build:all
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

name: Mobile Apps – Typecheck

on:
  push:
    branches: [main, 'claude/*']
    paths:
      - 'mobile-user-app/**'
      - 'mobile-driver-app/**'
      - '.github/workflows/mobile-typecheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile-user-app/**'
      - 'mobile-driver-app/**'
      - '.github/workflows/mobile-typecheck.yml'

jobs:
  typecheck:
    name: Typecheck ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [mobile-user-app, mobile-driver-app]

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

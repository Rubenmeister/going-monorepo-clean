name: CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (blank = auto-detect affected)'
        required: false
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY: gcr.io

jobs:
  detect-changes:
    name: Detect affected services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.affected.outputs.services }}
      has_changes: ${{ steps.affected.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Detect affected deployable services
        id: affected
        run: |
          if [ -n "${{ inputs.service }}" ]; then
            echo "services=[\"${{ inputs.service }}\"]" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOYABLE=(
            api-gateway
            user-auth-service
            transport-service
            payment-service
            booking-service
            tracking-service
            notifications-service
            billing-service
            experiencias-service
            tours-service
            anfitriones-service
            voice-service
            analytics-service
            ratings-service
            envios-service
          )

          AFFECTED=$(npx nx show projects --affected --base=origin/main~1 --head=HEAD 2>/dev/null || echo "")

          DEPLOY_LIST="["
          FIRST=true
          for svc in "${DEPLOYABLE[@]}"; do
            if echo "$AFFECTED" | grep -qw "$svc"; then
              if [ "$FIRST" = true ]; then FIRST=false; else DEPLOY_LIST+=","; fi
              DEPLOY_LIST+="\"$svc\""
            fi
          done
          DEPLOY_LIST+="]"

          if [ "$DEPLOY_LIST" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "services=$DEPLOY_LIST" >> "$GITHUB_OUTPUT"
          fi
          echo "Affected deployable services: $DEPLOY_LIST"

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "path=${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "path=Dockerfile.cloudrun" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile.cloudrun-service" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest || true
          docker build \
            --cache-from ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest \
            -f ${{ steps.dockerfile.outputs.path }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest

  deploy-staging:
    name: Deploy ${{ matrix.service }} → staging
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (staging)
        run: |
          gcloud run deploy ${{ matrix.service }}-staging \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 300 \
            --set-env-vars "NODE_ENV=staging" \
            --quiet

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ matrix.service }}-staging \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for ${{ matrix.service }}-staging"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not return 200 after 5 attempts"

  deploy-production:
    name: Deploy ${{ matrix.service }} → production
    needs: [detect-changes, deploy-staging]
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (production)
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "NODE_ENV=production" \
            --quiet

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ matrix.service }} \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for ${{ matrix.service }}"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed for ${{ matrix.service }} in production"
          exit 1

name: CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (blank = auto-detect affected)'
        required: false
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY: gcr.io

jobs:
  detect-changes:
    name: Detect affected services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.affected.outputs.services }}
      has_changes: ${{ steps.affected.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Detect affected deployable services
        id: affected
        run: |
          if [ -n "${{ inputs.service }}" ]; then
            echo "services=[\"${{ inputs.service }}\"]" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOYABLE=(
            api-gateway
            user-auth-service
            transport-service
            payment-service
            booking-service
            tracking-service
            notifications-service
            billing-service
            experiencias-service
            tours-service
            anfitriones-service
            voice-service
            analytics-service
            ratings-service
            envios-service
            customer-support-service
            voice-call-service
          )

          # Base/head de nx-set-shas (último deploy exitoso → HEAD). Más robusto
          # que origin/main~1: si un run quedó cancelado (p. ej. por concurrencia),
          # el siguiente sigue viendo esos commits y no se pierde el deploy.
          AFFECTED=$(npx nx show projects --affected --base="${NX_BASE:-origin/main~1}" --head="${NX_HEAD:-HEAD}" 2>/dev/null || echo "")

          DEPLOY_LIST="["
          FIRST=true
          for svc in "${DEPLOYABLE[@]}"; do
            if echo "$AFFECTED" | grep -qw "$svc"; then
              if [ "$FIRST" = true ]; then FIRST=false; else DEPLOY_LIST+=","; fi
              DEPLOY_LIST+="\"$svc\""
            fi
          done
          DEPLOY_LIST+="]"

          if [ "$DEPLOY_LIST" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "services=$DEPLOY_LIST" >> "$GITHUB_OUTPUT"
          fi
          echo "Affected deployable services: $DEPLOY_LIST"

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "path=${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "path=Dockerfile.cloudrun" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile.cloudrun-service" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest || true
          docker build \
            --cache-from ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest \
            -f ${{ steps.dockerfile.outputs.path }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${{ matrix.service }}:latest

  deploy-staging:
    name: Deploy ${{ matrix.service }} → staging
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Compose secret bindings
        id: secrets
        run: |
          BASE="MONGODB_URI=going-mongodb-uri:latest,REDIS_URL=going-redis-url:latest,JWT_SECRET=going-jwt-secret:latest"
          case "${{ matrix.service }}" in
            payment-service|billing-service)
              EXTRA=",STRIPE_SECRET_KEY=going-stripe-secret-key:latest,STRIPE_PUBLISHABLE_KEY=going-stripe-publishable-key:latest,STRIPE_WEBHOOK_SECRET=going-stripe-webhook-secret:latest" ;;
            notifications-service)
              EXTRA=",TWILIO_ACCOUNT_SID=going-twilio-account-sid:latest,TWILIO_AUTH_TOKEN=going-twilio-auth-token:latest,SENDGRID_API_KEY=going-sendgrid-api-key:latest" ;;
            *) EXTRA="" ;;
          esac
          echo "flags=${BASE}${EXTRA}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run (staging)
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${SERVICE}:${{ github.sha }}"
          case "$SERVICE" in
            customer-support-service|voice-call-service)
              # Preservar config externa (secretos/env/escalado fijados fuera
              # del CD): actualizar SOLO la imagen. Y solo si el servicio ya
              # existe, para no crear un staging vacío sin claves.
              if gcloud run services describe "${SERVICE}-staging" --region "${{ env.GCP_REGION }}" --platform managed >/dev/null 2>&1; then
                gcloud run deploy "${SERVICE}-staging" \
                  --image "$IMAGE" \
                  --region "${{ env.GCP_REGION }}" \
                  --platform managed \
                  --quiet
              else
                echo "::notice::${SERVICE}-staging no existe; se omite el deploy a staging (preserva config externa)"
              fi
              ;;
            *)
              gcloud run deploy "${SERVICE}-staging" \
                --image "$IMAGE" \
                --region "${{ env.GCP_REGION }}" \
                --platform managed \
                --memory 512Mi \
                --cpu 1 \
                --min-instances 0 \
                --max-instances 5 \
                --timeout 300 \
                --set-env-vars "NODE_ENV=staging" \
                --set-secrets "${{ steps.secrets.outputs.flags }}" \
                --quiet
              ;;
          esac

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ matrix.service }}-staging \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::notice::${{ matrix.service }}-staging no existe o sin URL; se omite el health check de staging"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for ${{ matrix.service }}-staging"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not return 200 after 5 attempts"

  deploy-production:
    name: Deploy ${{ matrix.service }} → production
    needs: [detect-changes, deploy-staging]
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Compose secret bindings
        id: secrets
        run: |
          BASE="MONGODB_URI=going-mongodb-uri:latest,REDIS_URL=going-redis-url:latest,JWT_SECRET=going-jwt-secret:latest"
          case "${{ matrix.service }}" in
            payment-service|billing-service)
              EXTRA=",STRIPE_SECRET_KEY=going-stripe-secret-key:latest,STRIPE_PUBLISHABLE_KEY=going-stripe-publishable-key:latest,STRIPE_WEBHOOK_SECRET=going-stripe-webhook-secret:latest" ;;
            notifications-service)
              EXTRA=",TWILIO_ACCOUNT_SID=going-twilio-account-sid:latest,TWILIO_AUTH_TOKEN=going-twilio-auth-token:latest,SENDGRID_API_KEY=going-sendgrid-api-key:latest" ;;
            *) EXTRA="" ;;
          esac
          echo "flags=${BASE}${EXTRA}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run (production)
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT }}/${SERVICE}:${{ github.sha }}"
          case "$SERVICE" in
            customer-support-service|voice-call-service)
              # Preservar config externa (secretos/env/escalado): actualizar
              # SOLO la imagen. Solo si el servicio ya existe en producción.
              if gcloud run services describe "${SERVICE}" --region "${{ env.GCP_REGION }}" --platform managed >/dev/null 2>&1; then
                gcloud run deploy "${SERVICE}" \
                  --image "$IMAGE" \
                  --region "${{ env.GCP_REGION }}" \
                  --platform managed \
                  --quiet
              else
                echo "::error::${SERVICE} no existe en producción; abortando para no crear un servicio sin secretos"
                exit 1
              fi
              ;;
            *)
              gcloud run deploy "${SERVICE}" \
                --image "$IMAGE" \
                --region "${{ env.GCP_REGION }}" \
                --platform managed \
                --memory 1Gi \
                --cpu 1 \
                --min-instances 1 \
                --max-instances 10 \
                --timeout 300 \
                --set-env-vars "NODE_ENV=production" \
                --set-secrets "${{ steps.secrets.outputs.flags }}" \
                --quiet
              ;;
          esac

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ matrix.service }} \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::warning::No se pudo obtener la URL de ${{ matrix.service }}; se omite el health check"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed for ${{ matrix.service }}"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed for ${{ matrix.service }} in production"
          exit 1

name: Build Android User App

# IMPORTANTE: este workflow NO es la fuente oficial de las AABs.
# La build oficial se hace con EAS (eas build --profile production --platform android)
# desde la PC del developer. El workflow local Gradle queda disponible
# como SOLO MANUAL para debug ocasional o si se quiere build interno
# sin pasar por EAS.
#
# Triggers automatic (push) deshabilitados — fallaba en cada push a main
# que tocaba mobile-user-app/* porque los secrets ANDROID_KEYSTORE_*
# no están sincronizados con el keystore actual de Play Console.
# EAS gestiona su propio keystore remoto y firma sin estos secrets.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (mobile-user-app)
        working-directory: mobile-user-app
        # mobile-user-app tiene su propio package.json (Expo standalone),
        # `pnpm install` resuelve sus deps locales sin tocar el workspace
        # raíz. Mantenemos --no-frozen-lockfile porque el lockfile móvil
        # se regenera por la naturaleza del proyecto Expo.
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > mobile-user-app/android/app/release.keystore
          keytool -list -keystore mobile-user-app/android/app/release.keystore -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -storetype PKCS12 || true

      - name: Configure Mapbox token
        run: |
          sed -i '/MAPBOX_DOWNLOADS_TOKEN/d' mobile-user-app/android/gradle.properties
          echo "MAPBOX_DOWNLOADS_TOKEN=${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}" >> mobile-user-app/android/gradle.properties

      - name: Configure release signing
        run: |
          echo "ANDROID_KEYSTORE_FILE=release.keystore" >> mobile-user-app/android/gradle.properties
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> mobile-user-app/android/gradle.properties
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> mobile-user-app/android/gradle.properties
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> mobile-user-app/android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x mobile-user-app/android/gradlew

      - name: Build release AAB
        working-directory: mobile-user-app/android
        run: ./gradlew bundleRelease
        env:
          EXPO_PUBLIC_API_URL: https://api.goingec.com
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: going-user-app-release
          path: mobile-user-app/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NX_CLOUD_DISTRIBUTED_EXECUTION: false

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Lint affected projects
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected lint
        run: npx nx affected -t lint --parallel=3

  # ──────────────────────────────────────────────────────────
  # Job 2: Test affected projects
  # ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected tests
        run: npx nx affected -t test --parallel=3 --configuration=ci
        env:
          CI: true

  # ──────────────────────────────────────────────────────────
  # Job 3: Build affected projects
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected build
        run: npx nx affected -t build --parallel=3

  # ──────────────────────────────────────────────────────────
  # Job 4: Build Docker images for affected services
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-auth-service
          - booking-service
          - payment-service
          - transport-service
          - tracking-service
          - notifications-service
          - tours-service
          - experiencias-service
          - envios-service
          - anfitriones-service
          - academy-service
          - blog-service
        include:
          - service: api-gateway
            port: 3000
          - service: user-auth-service
            port: 3009
          - service: booking-service
            port: 3010
          - service: payment-service
            port: 3001
          - service: transport-service
            port: 3006
          - service: tracking-service
            port: 3008
          - service: notifications-service
            port: 3002
          - service: tours-service
            port: 3005
          - service: experiencias-service
            port: 3004
          - service: envios-service
            port: 3007
          - service: anfitriones-service
            port: 3003
          - service: academy-service
            port: 3011
          - service: blog-service
            port: 3012
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PORT=${{ matrix.port }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI (Pruebas Automatizadas)

on:
  # Se ejecuta en cada 'push' a la rama 'main' o ramas de trabajo 'claude/*'
  push:
    branches:
      - main
      - 'claude/*'
  # Y en cada 'pull request' (solicitud de cambio) a 'main'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Probar y Construir Proyectos Afectados
    runs-on: ubuntu-latest # Usar una máquina virtual de Linux
    
    steps:
      # 1. Obtener el código del repositorio
      - name: Checkout (Obtener código)
        uses: actions/checkout@v4
        with:
          # Necesario para que Nx pueda comparar los cambios
          fetch-depth: 0 

      # 2. Configurar las SHAs de Nx para detección de cambios
      - name: Set Nx SHAs (Configurar SHAs de Nx)
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      # 3. Configurar pnpm (package manager oficial del monorepo)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. Configurar Node.js con cache pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 5. Instalar dependencias (frozen-lockfile en CI)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Ejecutar las pruebas SOLO de los proyectos "afectados"
      # Nx compara tu rama con 'main' y encuentra qué cambió
      - name: Run affected tests (Ejecutar pruebas afectadas)
        run: npx nx affected -t test --base=origin/main --head=HEAD --parallel
        continue-on-error: false

      # 6. Ejecutar el linter SOLO de los proyectos "afectados"
      - name: Run affected lint (Ejecutar linter afectado)
        run: npx nx affected -t lint --base=origin/main --head=HEAD --parallel
        continue-on-error: true

      # 6.5 Escaneo de Seguridad (SAST) con Snyk
      - name: Run Snyk security scan (Escaneo de seguridad)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json
        continue-on-error: true

      # 7. Construir el código SOLO de los proyectos "afectados"
      # Esto asegura que el código compile correctamente
      - name: Run affected build (Construir proyectos afectados)
        run: npx nx affected -t build --base=origin/main --head=HEAD --parallel


version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:5.0
    container_name: going-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: going_user
      MONGO_INITDB_ROOT_PASSWORD: going_password
      MONGO_INITDB_DATABASE: going_platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - going_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: going-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - going_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Transport Service
  transport-service:
    build:
      context: .
      target: transport-service
    container_name: going-transport
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Payment Service
  payment-service:
    build:
      context: .
      target: payment-service
    container_name: going-payment
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3004
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Ratings Service
  ratings-service:
    build:
      context: .
      target: ratings-service
    container_name: going-ratings
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3005
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Analytics Service
  analytics-service:
    build:
      context: .
      target: analytics-service
    container_name: going-analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Chat Service
  chat-service:
    build:
      context: .
      target: chat-service
    container_name: going-chat
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3007
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Geolocation Service
  geolocation-service:
    build:
      context: .
      target: geolocation-service
    container_name: going-geolocation
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3008
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 3000
    container_name: going-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      USER_AUTH_SERVICE_URL: http://user-auth-service:3001
      BOOKING_SERVICE_URL: http://booking-service:3002
      TRANSPORT_SERVICE_URL: http://transport-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3012
      TRACKING_SERVICE_URL: http://tracking-service:3011
    ports:
      - "3000:3000"
    depends_on:
      - user-auth-service
    networks:
      - going_network

  # User Auth Service
  user-auth-service:
    build:
      context: .
      dockerfile: user-auth-service/Dockerfile
      args:
        SERVICE_NAME: user-auth-service
        SERVICE_PORT: 3001
    container_name: going-user-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      USER_DB_URL: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Booking Service
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
      args:
        SERVICE_NAME: booking-service
        SERVICE_PORT: 3002
    container_name: going-booking
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      BOOKING_DB_URL: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Tracking Service
  tracking-service:
    build:
      context: .
      dockerfile: tracking-service/Dockerfile
      args:
        SERVICE_NAME: tracking-service
        SERVICE_PORT: 3011
    container_name: going-tracking
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3011
      MONGO_URL: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "3011:3011"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Notifications Service
  notifications-service:
    build:
      context: .
      dockerfile: notifications-service/Dockerfile
      args:
        SERVICE_NAME: notifications-service
        SERVICE_PORT: 3012
    container_name: going-notifications
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3012
      NOTIFICATION_DB_URL: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "3012:3012"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # ======================== OBSERVABILITY STACK ========================
  # Elasticsearch - Log storage and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: going-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ElasticPassword123!}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - going_network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana - Log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: going-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ElasticPassword123!}
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - going_network
    healthcheck:
      test: curl -s http://localhost:5601/api/status >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  # Logstash - Log processing and enrichment
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: going-logstash
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ElasticPassword123!}
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    volumes:
      - ./config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - going_network
    healthcheck:
      test: curl -s http://localhost:9600 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: going-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - going_network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:9090 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: going-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - going_network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  going_network:
    driver: bridge

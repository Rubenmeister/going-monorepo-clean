version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:5.0
    container_name: going-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: going_user
      MONGO_INITDB_ROOT_PASSWORD: going_password
      MONGO_INITDB_DATABASE: going_platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - going_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: going-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - going_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Transport Service
  transport-service:
    build:
      context: .
      target: transport-service
    container_name: going-transport
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Payment Service
  payment-service:
    build:
      context: .
      target: payment-service
    container_name: going-payment
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3004
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Ratings Service
  ratings-service:
    build:
      context: .
      target: ratings-service
    container_name: going-ratings
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3005
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Analytics Service
  analytics-service:
    build:
      context: .
      target: analytics-service
    container_name: going-analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Chat Service
  chat-service:
    build:
      context: .
      target: chat-service
    container_name: going-chat
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3007
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

  # Geolocation Service
  geolocation-service:
    build:
      context: .
      target: geolocation-service
    container_name: going-geolocation
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://going_user:going_password@mongodb:27017/going_platform
      REDIS_URL: redis://redis:6379
      PORT: 3008
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - going_network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  going_network:
    driver: bridge

# customer-support-service — Cloud Run Service deployment
#
# Build context: monorepo ROOT — usa Dockerfile.cloudrun-service genérico
# (mismo patrón que user-auth-service y resto de NestJS services). Esto
# permite que el servicio importe `@going-platform/cerebro-contracts`
# (workspace lib) para publicar eventos al cerebro-service.
#
# Trigger:
#   gcloud builds submit . --config=customer-support-service/cloudbuild.yaml --project=going-5d1ae

steps:
  # 1. Build con Dockerfile genérico de NestJS services, contexto = monorepo root.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.cloudrun-service
      - --build-arg
      - SERVICE_NAME=customer-support-service
      - -t
      - gcr.io/$PROJECT_ID/customer-support-service:latest
      - .
    timeout: '1800s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/customer-support-service:latest

  # 2. Deploy as Cloud Run Service (always-on, receives Meta WhatsApp + Telegram webhooks).
  #
  # Secrets gestionados por Cloud Build (Secret Manager):
  #   JWT_SECRET-prod  — JWT compartido con transport-service para crear rides desde el chat
  #   MAPBOX_TOKEN     — geocoding EC para resolver direcciones del usuario
  #
  # Vars que se setean fuera del cloudbuild (vía `gcloud run services update --update-env-vars`):
  #   MONGO_URL                 — Mongo Atlas (DB: going-support)
  #   META_WA_ACCESS_TOKEN      — Meta System User token (whatsapp_business_messaging)
  #   WHATSAPP_PHONE_NUMBER_ID  — phone ID de Meta Business Suite
  #   WHATSAPP_BUSINESS_ACCOUNT_ID — WABA ID (opcional, para /whatsapp/diagnose)
  #   WHATSAPP_VERIFY_TOKEN     — verify token del webhook de Meta
  #   TELEGRAM_BOT_TOKEN        — token del bot de Telegram (BotFather)
  #   TELEGRAM_WEBHOOK_SECRET   — opcional, valida el header del webhook de Telegram
  #   OPERATOR_TELEGRAM_CHAT_IDS — comma-separated chat IDs de operadores
  #   TRANSPORT_SERVICE_URL     — URL interna de transport-service en Cloud Run
  #   CEREBRO_PUBLISH_ENABLED   — true en producción. Cron interno cada 10 min publica
  #                                 al cerebro-service. Pausar solo si cerebro-service
  #                                 está caído (raro, tiene min-instances=1).
  #
  # NOTA: Anthropic + Twilio quedaron deprecados aquí — el LLM corre sobre
  # Vertex AI (Gemini) y todo WhatsApp (inbound + outbound) usa Meta Cloud API.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - customer-support-service
      - --image=gcr.io/$PROJECT_ID/customer-support-service:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --cpu=1
      - --memory=512Mi
      # min-instances=1 es OBLIGATORIO en producción: el CerebroPublisherService
      # usa @Cron interno cada 10 min. Con scale-to-zero el container se duerme
      # entre requests y el timer del cron muere — no dispara nunca. min=1
      # mantiene el container vivo. Costo: ~$5/mes adicional.
      # TEMP pre-prod (ahorro): escalado a 0; el cron NO corre. Restaurar a 1 antes del go-live.
      - --min-instances=0
      - --max-instances=5
      # timeout 300s (5 min) en lugar del default 60s. Las notas de voz
      # combinan STT (5-50s; Deepgram rápido + fallback Google lento) + LLM
      # (2-4s OpenAI nano) + TTS Chirp3 HD (2-5s) + envío WhatsApp (2s).
      # Con 60s el flujo se cortaba antes de responder al usuario.
      - --timeout=300
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,NODE_ENV=production,CEREBRO_PUBLISH_ENABLED=true
      # IMPORTANTE: --set-secrets reemplaza TODA la lista de secrets del servicio
      # (no es additive). Cualquier secret no listado acá queda SIN seterar tras
      # el deploy. Por eso enumeramos los 17 secrets del runtime. Bug #8 del
      # roadmap: un deploy previo solo declaró JWT+MAPBOX+MONGO y nukeó
      # OPENAI_API_KEY, DEEPGRAM, TELEGRAM, etc. Validamos en 2026-05-23.
      - --set-secrets=JWT_SECRET=JWT_SECRET-prod:latest,MONGO_URL=MONGO_URL-prod:latest,USER_DB_URL=MONGO_URL-prod:latest,MAPBOX_TOKEN=MAPBOX_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,META_WA_ACCESS_TOKEN=META_WA_ACCESS_TOKEN:latest,WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest,WHATSAPP_BUSINESS_ACCOUNT_ID=WHATSAPP_BUSINESS_ACCOUNT_ID:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,TELEGRAM_WEBHOOK_SECRET=TELEGRAM_WEBHOOK_SECRET:latest,OPERATOR_TELEGRAM_CHAT_IDS=OPERATOR_TELEGRAM_CHAT_IDS:latest,REDIS_URL=redis-url:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,INTERNAL_SERVICE_TOKEN=INTERNAL_SERVICE_TOKEN:latest
      # VPC connector necesario para conectar a MongoDB Atlas (whitelist IP).
      - --vpc-connector=going-connector
      - --vpc-egress=all-traffic
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

images:
  - gcr.io/$PROJECT_ID/customer-support-service:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { background: #0f0f1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; }
.header { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 16px; }
.subtitle { color: #9CA3AF; font-size: 11px; }
.version { color: #374151; font-size: 10px; }
.stage { display: flex; align-items: center; gap: 16px; }
.phone-wrap { position: relative; }
.phone {
  width: 295px; height: 638px; background: #000;
  border-radius: 46px; border: 6px solid #1a1a1a;
  box-shadow: 0 0 0 1px #333, 0 24px 80px rgba(0,0,0,0.8);
  overflow: hidden; position: relative;
}
.notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 22px; background: #000; border-radius: 0 0 14px 14px; z-index: 100; }
.screen { width: 100%; height: 100%; overflow: hidden; transition: opacity 0.2s; }
.nav-btn {
  width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.18); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.info { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 14px; }
.screen-label { color: #E5E7EB; font-size: 13px; font-weight: 600; }
.screen-counter { color: #6B7280; font-size: 11px; }
.dots { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; max-width: 400px; }
.dot {
  width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15); color: #9CA3AF; font-size: 8px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
}
.dot.active { background: #F04E40; border-color: #F04E40; color: #fff; font-weight: 700; }
.dot:hover { background: rgba(255,255,255,0.18); }
.flow-label { color: #6B7280; font-size: 10px; text-align: center; margin-top: 8px; }
</style>

"Login",
"Crear cuenta",
"Home",
"Men&uacute; lateral",
"Confirmar reserva",
"Conductor en camino",

"Men&uacute; lateral &mdash; Tours",
"Men&uacute; lateral &mdash; Env&iacute;os",
"SOS &mdash; Emergencia",
"Academia Going"
];

let current = 0;
let history = [];

function render(n, pushHistory = true) {
  if (n < 0 || n >= screens.length) return;
  if (pushHistory && n !== current) history.push(current);
  current = n;
  const html = screens[n]
    .replace(/__PLH__/g, LH_DATA)
    .replace(/__PLW__/g, LW_DATA)
    .replace(/__PLWV__/g, LWV_DATA);
  document.getElementById('screen-content').innerHTML = html;
  document.getElementById('screen-label').innerHTML = labels[n];
  document.getElementById('screen-counter').textContent = (n+1) + ' de ' + screens.length;
  document.getElementById('btn-prev').disabled = n === 0;
  document.getElementById('btn-next').disabled = n === screens.length - 1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===n));
}

function goTo(n) { render(n, true); }
function goBack() { if (history.length > 0) { render(history.pop(), false); } else { render(0, false); } }
function prev() { if (current > 0) render(current - 1, true); }
function next() { if (current < screens.length - 1) render(current + 1, true); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'ArrowRight') next();
});

// Build dots
const dots = document.getElementById('dots');
for (let i = 0; i < screens.length; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  d.textContent = i + 1;
  d.title = labels[i].replace(/&[a-z]+;/g,'').replace(/&#[0-9]+;/g,'');
  d.onclick = () => render(i, true);
  dots.appendChild(d);
}

// Header logo
document.getElementById('logo-header').src = 'data:image/png;base64,' + LH_DATA;

// Start
render(0, false);
</script>

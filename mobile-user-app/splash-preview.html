<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Going | Splash Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Nunito',sans-serif; }
  .phone { width:390px; height:844px; position:relative; overflow:hidden; border-radius:40px; box-shadow:0 30px 80px rgba(0,0,0,0.7); }
  .bg { position:absolute; inset:0; background:#0a0f1d; }
  .bg img { width:100%; height:100%; object-fit:cover; transform:scale(1.10); opacity:0.70; filter:brightness(1.1); }
  .vignette { position:absolute; inset:0; background:radial-gradient(circle at center, transparent 20%, rgba(10,15,29,0.6) 100%); }
  .overlay { position:absolute; inset:0; background:rgba(10,15,29,0.10); }
  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .glow { position:absolute; width:300px; height:300px; border-radius:50%; background:#b71416; opacity:0; filter:blur(80px); animation:pulse-glow 4s ease-in-out infinite; }
  .logo-wrap { animation:logo-born 1.8s cubic-bezier(0.34,1.56,0.64,1) forwards; opacity:0; position:relative; z-index:2; }
  .logo-wrap img { width:200px; height:auto; filter:drop-shadow(0 0 30px rgba(255,76,65,0.35)); }
  .tagline { margin-top:24px; font-size:11px; color:rgba(250,248,255,0.88); font-weight:800; letter-spacing:5.5px; text-transform:uppercase; text-shadow:0 1px 4px rgba(0,0,0,0.5); opacity:0; animation:fade-in-up 1s ease-out 1.2s forwards; position:relative; z-index:2; }
  .stamp { position:absolute; bottom:64px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; animation:fade-in-up 1s ease-out 1.8s forwards; }
  .stamp-line { width:96px; height:1px; position:relative; background:rgba(250,248,255,0.20); }
  .stamp-line::after { content:''; position:absolute; left:25%; right:25%; top:0; height:1px; background:rgba(255,45,45,0.60); }
  .est-row { display:flex; align-items:center; gap:16px; }
  .est-dash { width:24px; height:1px; background:rgba(250,248,255,0.10); }
  .est-text { font-size:9px; color:rgba(250,248,255,0.40); font-weight:900; letter-spacing:4px; text-transform:uppercase; }
  .corner { position:absolute; width:48px; height:48px; opacity:0.20; }
  .tl { top:48px; left:48px; border-top:1px solid #faf8ff; border-left:1px solid #faf8ff; }
  .br { bottom:48px; right:48px; border-bottom:1px solid #faf8ff; border-right:1px solid #faf8ff; }
  @keyframes logo-born {
    0%   { transform:scale(0.3) rotate(-10deg); opacity:0; filter:blur(20px) brightness(2); }
    60%  { transform:scale(1.1);  opacity:1; filter:blur(0) brightness(1.2); }
    100% { transform:scale(1);    opacity:1; filter:blur(0) brightness(1); }
  }
  @keyframes fade-in-up {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes pulse-glow {
    0%,100% { opacity:0.4; transform:scale(0.8); }
    50%     { opacity:0.7; transform:scale(1.2); }
  }
  .label { position:absolute; bottom:-30px; left:0; right:0; text-align:center; color:#888; font-size:12px; font-family:monospace; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>

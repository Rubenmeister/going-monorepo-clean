input {
  # TCP input for structured logs from services
  tcp {
    port => 5000
    codec => json
    type => "application"
  }

  # UDP input as fallback
  udp {
    port => 5000
    codec => json
    type => "application"
  }
}

filter {
  if [type] == "application" {
    # Parse JSON if not already parsed
    if [message] {
      json {
        source => "message"
        skip_on_invalid_json => true
      }
    }

    # Add timestamp if not present
    if ![timestamp] {
      mutate {
        add_field => { "[@timestamp]" => "%{@timestamp}" }
      }
    }

    # Extract key fields for better indexing
    mutate {
      add_field => {
        "environment" => "local"
        "platform" => "going"
      }

      # Rename common fields
      rename => {
        "service" => "service_name"
        "level" => "log_level"
        "requestId" => "request_id"
        "userId" => "user_id"
        "method" => "http_method"
        "path" => "http_path"
        "statusCode" => "http_status"
        "duration" => "response_time_ms"
      }
    }

    # Parse log level
    if [log_level] {
      mutate {
        lowercase => ["log_level"]
      }
    }

    # Add metadata
    if [http_status] {
      if [http_status] >= 500 {
        mutate {
          add_field => { "error" => true }
        }
      } else if [http_status] >= 400 {
        mutate {
          add_field => { "warning" => true }
        }
      }
    }

    # Parse user agent if present
    if [userAgent] {
      useragent {
        source => "userAgent"
        target => "user_agent"
      }
    }

    # Remove unnecessary fields
    mutate {
      remove_field => ["host", "@version"]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD:ElasticPassword123!}"
    index => "going-logs-%{+YYYY.MM.dd}"
    manage_template => true
    template_name => "going-logs-template"
    template_overwrite => false
  }

  # Console output for debugging (remove in production)
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }
}

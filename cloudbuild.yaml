steps:
  # Step 1: Build Docker image con Dockerfile.cloudrun
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api-gateway:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    timeout: '1800s'

  # Step 2: Push imagen a Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/api-gateway:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/api-gateway:latest'

  # Step 3: Deploy a Cloud Run
  # IMPORTANTE: JWT_SECRET y otras credenciales sensibles deben estar
  # configuradas en GCP Secret Manager y referenciadas aquí con --set-secrets,
  # NO como variables de entorno en texto plano.
  # Instrucciones:
  #   1. Crea el secreto: gcloud secrets create JWT_SECRET --replication-policy=automatic
  #   2. Agrega el valor: echo -n "tu-secreto-seguro" | gcloud secrets versions add JWT_SECRET --data-file=-
  #   3. Otorga acceso: gcloud secrets add-iam-policy-binding JWT_SECRET \
  #        --member="serviceAccount:$PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
  #        --role="roles/secretmanager.secretAccessor"
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'api-gateway'
      - '--image'
      - 'gcr.io/$PROJECT_ID/api-gateway:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production,JWT_EXPIRES_IN=15m,USER_AUTH_SERVICE_URL=http://localhost:3009,TRANSPORT_SERVICE_URL=http://localhost:3006,PAYMENT_SERVICE_URL=http://localhost:3001,TOURS_SERVICE_URL=http://localhost:3005,ANFITRIONES_SERVICE_URL=http://localhost:3003,EXPERIENCIAS_SERVICE_URL=http://localhost:3004,ENVIOS_SERVICE_URL=http://localhost:3007,NOTIFICATIONS_SERVICE_URL=http://localhost:3008,TRACKING_SERVICE_URL=http://localhost:3002,BOOKING_SERVICE_URL=http://localhost:3010'
      - '--set-secrets'
      - 'JWT_SECRET=JWT_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/api-gateway:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/api-gateway:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

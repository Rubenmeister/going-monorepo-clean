# Recargos dinámicos — hora del día, día de la semana, feriados
#
# ⚠️ NEUTRALIZADOS a 1.00 (2026-07-02). Decisión de Rubén: TODOS los precios
# de las listas actuales (compartido, privado, empresas) son EXPLÍCITOS y
# finales — la cotización debe devolver exactamente el número de la lista, sin
# recargos por hora/día/feriado.
#
# Los multiplicadores dinámicos (día, hora, condiciones, etc.) se RESERVAN para
# el producto futuro de ride-hailing intraciudad tipo Uber, que aún NO está
# abierto. Cuando se lance, ese producto tendrá su propia lógica de surge y
# estos valores se definirán ahí. Mientras tanto: todo en 1.00 (sin efecto).

version: "3.0"
vigente_desde: "2026-07-02"
ultima_revision: "2026-07-02"
revisor: "Rubén — precios explícitos, dinámico reservado para ride-hailing"

# ── Hora del día ── (neutral — reservado para ride-hailing)
hora_del_dia:
  - id: diurno_estandar
    label: "Estándar"
    rango_horas: ["00:00-24:00"]
    privado_multiplier: 1.00
    compartido_multiplier: 1.00

# ── Día de la semana ── (neutral — reservado para ride-hailing)
dia_de_la_semana:
  - id: dia_estandar
    label: "Todos los días"
    dias: [lunes, martes, miercoles, jueves, viernes, sabado, domingo]
    privado_multiplier: 1.00
    compartido_multiplier: 1.00

# ── Feriados ── (neutral — reservado para ride-hailing)
feriado:
  privado_multiplier: 1.00
  compartido_multiplier: 1.00
  descripcion: "Neutralizado — precios explícitos. Reservado para ride-hailing."

# Ruta Norte — Quito ↔ Cayambe ↔ Otavalo ↔ Ibarra ↔ Tulcán
#
# ⚠️ TARIFAS PROVISIONALES — confirmar con operaciones Going antes del lanzamiento.
# Los valores abajo vienen del estado actual de going-services.ts y NO han sido
# validados con operaciones contables ni con conductores.
#
# Estructura de cada tramo:
#   ruta:           descripción humana origen → destino
#   comp_suv:       precio por persona en SUV compartido (USD)
#   comp_suvxl:     precio por persona en SUV XL compartido (USD)
#   priv_suv:       precio total del vehículo SUV privado (USD)
#   priv_suvxl:     precio total SUV XL privado
#   priv_van:       precio total VAN (7 pax)
#   priv_vanxl:     precio total VAN XL (12 pax)
#   priv_minibus:   precio total Minibús (20 pax)
#   priv_bus:       precio total Bus (30 pax)
#   prem_suv:       precio total Premium SUV (privado + confort superior)
#   nota:           cualquier excepción (recargo fijo, precio especial, etc.)
#
# Recargos automáticos del sistema (sumar a los precios base):
#   +$5 cuando el ORIGEN es: Quito Sur, Cumbayá/Tumbaco, Los Chillos, Aeropuerto
#   +% hora pico   → definido en pricing-service backend
#   +% nocturno    → definido en pricing-service backend
#   +% fin semana  → definido en pricing-service backend
#   +25% corporativo (recargo, NO descuento) sobre tarifa privada Confort


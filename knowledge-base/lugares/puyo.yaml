history_es: |
  Puyo es la capital de la provincia de Pastaza, en la Amazonía centro
  del Ecuador. Su nombre proviene del kichwa "puyu" (nube), por la niebla
  que cubre la región en las mañanas.

  Fundada en 1899 como una pequeña misión dominicana, la ciudad creció
  con la llegada de colonos serranos y se consolidó como puerta de entrada
  a la Amazonía oriental ecuatoriana. La región alberga 7 nacionalidades
  indígenas: Achuar, Andoa, Kichwa, Shiwiar, Shuar, Sápara y Waorani —
  centros culturales clave del país.

  Puyo es base para expediciones a comunidades indígenas amazónicas, al
  Parque Nacional Llanganates y al Parque Nacional Sangay (Patrimonio
  Natural UNESCO).


history_es: |
  Manta tiene una historia que predata a la conquista española: fue uno de
  los centros más importantes de la cultura Manteño-Huancavilca, comerciantes
  marítimos prehispánicos que navegaban toda la costa pacífica desde el
  actual México hasta Chile.

  La ciudad moderna fue fundada en 1535 y desde entonces ha sido un
  puerto clave. Hoy es el principal puerto pesquero del Ecuador y uno de
  los mayores procesadores de atún del Pacífico Sur. Su industria pesquera
  es central para la economía nacional.

  En 2016 sufrió graves daños por el terremoto del 16 de abril (Pedernales),
  del que se ha ido recuperando. La ciudad mantiene una mezcla de carácter
  industrial-pesquero, turismo de playa y cultura manabita.


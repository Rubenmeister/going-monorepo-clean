history_es: |
  Loja fue fundada por el capitán Alonso de Mercadillo el 8 de diciembre de
  1548. Es una de las ciudades más antiguas del Ecuador. Su nombre proviene
  de Loja en Andalucía (España).

  Conocida como la "Capital Musical y Cultural del Ecuador" por su tradición
  de compositores, intérpretes y conservatorios. La ciudad también es cuna
  de figuras como el científico y polígrafo del siglo XVIII Pedro Vicente
  Maldonado, y del expresidente Bernardo Valdivieso.

  Está rodeada de un entorno biodiverso clave: el Parque Nacional Podocarpus
  (uno de los más biodiversos del mundo en su área), el valle de Vilcabamba
  (famoso por la longevidad de sus habitantes) y la frontera con Perú.


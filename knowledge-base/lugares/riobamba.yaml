history_es: |
  Riobamba es la primera ciudad fundada por los españoles en territorio del
  actual Ecuador (15 de agosto de 1534, antes que Quito). Fue refundada en
  su ubicación actual tras el terremoto de 1797 que destruyó la primera sede.

  Conocida como la "Sultana de los Andes" por su ubicación al pie del volcán
  Chimborazo (6.263 m), la cumbre más alta del Ecuador y el punto más
  cercano al sol desde el centro de la Tierra (por el abultamiento ecuatorial).
  Fue capital de Ecuador durante el primer congreso constituyente de 1830.

  Riobamba fue históricamente nodo ferroviario clave — la línea Quito-Guayaquil
  pasaba por aquí, incluyendo la mítica Nariz del Diablo.

attractions_es:
  - "Volcán Chimborazo — 6.263 m, punto más cercano al sol desde el centro de la Tierra"
  - "Nariz del Diablo — ruta ferroviaria histórica (cuando opera)"
  - "Parque Nacional Sangay — Patrimonio Natural UNESCO"
  - "Mercado La Merced — gastronomía y artesanía local"
  - "Catedral de Riobamba — primera fundada en Ecuador"
  - "Reserva Faunística Chimborazo — vicuñas y páramo"
  - "Laguna de Colta — paisaje andino accesible"

gastronomy_es:
  - "Hornado de Riobamba — uno de los más reconocidos del país"
  - "Caldo de 31 — sopa tradicional con vísceras de res"
  - "Yahuarlocro — sopa de borrego con sangre cocida"
  - "Chicha huevona — bebida fermentada con huevo y cerveza"
  - "Cholas de Guano — pan dulce típico"


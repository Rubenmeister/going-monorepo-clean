history_es: |
  Baños de Agua Santa debe su nombre a sus aguas termales subterráneas
  alimentadas por el volcán Tungurahua (5.023 m), aún activo. Es uno de
  los destinos turísticos más visitados del Ecuador, tanto por turismo
  nacional como internacional.

  La ciudad es la puerta entre la Sierra y la Amazonía, lo que se nota en
  su biodiversidad, su gastronomía y su clima de transición. El Tungurahua
  tuvo un período eruptivo intenso entre 1999 y 2016 — la ciudad ha
  convivido con el volcán como vecino respetable.

attractions_es:
  - "Ruta de las Cascadas — Pailón del Diablo, Manto de la Novia, Agoyán"
  - "Casa del Árbol — columpio sobre el abismo con vista al volcán Tungurahua"
  - "Termas de la Virgen — aguas medicinales en el centro de Baños"
  - "Rafting en el río Pastaza"
  - "Parapente sobre el cañón del Pastaza"
  - "Volcán Tungurahua — observatorio (cuando hay actividad)"
  - "Iglesia de Nuestra Señora del Rosario de Agua Santa"

gastronomy_es:
  - "Melcocha — dulce de caña típico de Baños"
  - "Taffy de caña — variante artesanal del melcocha"
  - "Truchas frescas — de criaderos locales"
  - "Caña guarapo — jugo de caña recién prensado"
  - "Empanadas de viento con queso fresco"


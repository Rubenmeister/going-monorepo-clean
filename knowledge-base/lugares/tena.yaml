# Lugar: Tena — capital amazónica, cuna del rafting ecuatoriano
id: tena
name: Tena
province: Napo
region: Amazonía
canton: Tena
is_canton_capital: true

geography:
  altitude_m: 511
  area_km2: 3897           # cantón completo
  population: 78076         # INEC 2022 estimación
  climate:

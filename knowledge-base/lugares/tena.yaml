history_es: |
  Tena fue fundada por los españoles en 1560 como uno de los puestos
  fronterizos hacia la Amazonía ecuatoriana. Su nombre proviene del kichwa.
  Es la capital de la provincia de Napo y puerta principal a la Amazonía
  ecuatoriana desde la Sierra Centro.

  La región es territorio ancestral del pueblo kichwa amazónico (también
  llamados Napo Runas), que mantiene viva su lengua, gastronomía y
  cosmovisión. Tena es punto de partida para el turismo amazónico de
  aventura — rafting, kayak, caminatas en selva primaria, comunidades
  indígenas.

  El cacao nativo de la región amazónica es reconocido mundialmente entre
  los mejores cacaos finos del mundo.

attractions_es:
  - "Rafting en el río Napo, Misahuallí o Jatunyacu"
  - "Comunidades Kichwas — turismo comunitario responsable"
  - "Cascada de Latas (Latas Yaku) — cascada accesible"
  - "Mirador del Bermejo / Parque Amazónico La Isla"
  - "Reserva Biosfera Sumaco-Napo-Galeras"
  - "Cacao nativo amazónico — visitas a fincas artesanales"
  - "Misahuallí — pueblo cercano, monos en la plaza, río Napo"

gastronomy_es:
  - "Maito de tilapia — pescado envuelto en hoja de bijao y cocido al carbón"
  - "Maito de pollo — variante con pollo"
  - "Chicha de yuca — bebida fermentada tradicional kichwa"
  - "Ayampaco — pescado o pollo con palmito en hoja, al carbón"
  - "Chocolate artesanal — del cacao nativo amazónico (¡finísimo!)"
  - "Chontacuro — gusano de la palma chonta, plato tradicional"

events_es:
  - name: "Cantonización de Tena"

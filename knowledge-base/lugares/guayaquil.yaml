history_es: |
  Guayaquil fue fundada por Francisco de Orellana en 1535 como Santiago de
  Guayaquil. Su ubicación estratégica en el estuario del río Guayas la
  convirtió en el principal puerto del Ecuador y, durante siglos, en
  astillero clave de la costa pacífica sudamericana.

  Es la ciudad más poblada del país y su capital económica. El 9 de octubre
  de 1820 proclamó la independencia de la corona española, dando inicio a
  la liberación del actual Ecuador. Famoso encuentro entre Bolívar y San
  Martín en julio de 1822 (Conferencia de Guayaquil).

attractions_es:
  - "Malecón 2000 — paseo ribereño emblemático del río Guayas"
  - "Las Peñas + Cerro Santa Ana — barrio colorido, escaleras a la cima"
  - "Parque Histórico — réplica de la Guayaquil colonial + fauna costera"
  - "Iguanas del Parque Seminario — íconos vivos del centro"
  - "Malecón del Salado — paseo alternativo, gastronomía"
  - "Isla Santay — eco-isla, accesible en bici desde el centro"
  - "Mercado Artesanal del Sur"

gastronomy_es:
  - "Ceviche guayaquileño — camarón, concha, pescado, con maíz tostado"
  - "Encebollado — sopa de pescado emblemática del desayuno costeño"
  - "Bolón de verde — bola de plátano verde con queso, chicharrón o relleno"
  - "Seco de pato / seco de gallina criolla"
  - "Cangrejada — banquete grupal de cangrejos del manglar (temporada)"
  - "Encocado de pescado — pescado en leche de coco"


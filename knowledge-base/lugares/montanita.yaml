history_es: |
  Montañita es una pequeña parroquia costera de la provincia de Santa Elena
  que se convirtió, desde los años 80 del siglo XX, en uno de los íconos
  del surf en el Pacífico sudamericano. Su ola izquierda es buscada por
  surfistas internacionales.

  Lo que era un poblado de pescadores se transformó en destino turístico
  internacional: vida nocturna, escuelas de surf, hostales y restaurantes
  pequeños. Aún conserva su esencia bohemia y comunitaria, aunque enfrenta
  los desafíos del turismo masivo.

attractions_es:
  - "Olas de Montañita — paraíso del surf, escuelas en la playa"
  - "Playa principal y Playa de Pescadores — bandera intermitente según oleaje"
  - "Pueblo Manglaralto — más tranquilo, a 10 min al norte"
  - "Avistamiento de ballenas jorobadas (julio - octubre)"
  - "Olón — playa familiar más al norte, paisaje similar"
  - "Vida nocturna en la Calle de los Cócteles"
  - "Día del Pescador — celebración local"

gastronomy_es:
  - "Ceviche de camarón / pescado / concha"
  - "Viche de mariscos — sopa de pescado con maní y mariscos"
  - "Encocado de pescado — leche de coco, plátano y arroz"
  - "Bolón de verde — variantes con queso o chicharrón"
  - "Patacones con queso y mariscos"
  - "Jugos tropicales naturales en cada esquina"


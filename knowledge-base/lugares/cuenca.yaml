history_es: |
  Cuenca, formalmente Santa Ana de los Cuatro Ríos de Cuenca, fue fundada
  el 12 de abril de 1557 sobre Tomebamba — capital del norte del imperio
  Inca. Su Centro Histórico fue declarado Patrimonio Cultural de la
  Humanidad por la UNESCO en 1999.

  Es conocida como "la Atenas del Ecuador" por su tradición intelectual,
  poética y musical. Sus cuatro ríos (Tomebamba, Yanuncay, Tarqui y
  Machángara) atraviesan la ciudad y le dan su nombre. Es la tercera ciudad
  más poblada del país.

attractions_es:
  - "Centro Histórico (Patrimonio UNESCO 1999) — calles empedradas, balcones"
  - "Catedral Nueva (Inmaculada Concepción) — cúpulas azules emblemáticas"
  - "Museo del Sombrero de Paja Toquilla — Panama Hat (Patrimonio UNESCO)"
  - "Parque Nacional Cajas — lagunas de altura a 30 min"
  - "Ruinas de Pumapungo — sitio inca-cañari"
  - "Mirador de Turi — vista panorámica de la ciudad"
  - "Río Tomebamba (Barranco) — paseo emblemático"

gastronomy_es:
  - "Cuy asado con papas — emblema de la cocina cuencana"
  - "Mote pillo — mote con huevo, cebolla y achiote"
  - "Hornado cuencano — variante regional"
  - "Morocho de leche — bebida caliente típica"
  - "Llapingachos — tortilla de papa con queso"
  - "Tamales y humitas serranos"


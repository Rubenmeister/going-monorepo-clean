.glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,76,65,0.45) 0%,transparent 70%);animation:pulse 4s ease-in-out infinite;top:42%;left:50%;transform:translate(-50%,-50%);}

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ops-agent:latest
      - .
    dir: ops-agent

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ops-agent:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ops-agent
      - --image=gcr.io/$PROJECT_ID/ops-agent:latest
      - --region=us-central1
      - --memory=512Mi
      - --cpu=1
      - --max-retries=1
      - --task-timeout=300s
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID
      - --set-secrets=TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe ops-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http ops-agent-trigger \
            --location=us-central1 \
            --schedule="*/30 * * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/ops-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http ops-agent-trigger \
            --location=us-central1 \
            --schedule="*/30 * * * *" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/ops-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/ops-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

# ops-agent — Cloud Run Job (cron-triggered) deployment
#
# Build context: monorepo ROOT (no agent dir) — el Dockerfile genérico
# `Dockerfile.cloudrun-agent` necesita acceso a pnpm-workspace.yaml,
# pnpm-lock.yaml, libs/cerebro-contracts y ops-agent/ todos juntos.
#
# Trigger:
#   gcloud builds submit . --config=ops-agent/cloudbuild.yaml --project=going-5d1ae
#
# Schedule (Cloud Scheduler): cada 15 min en hora Ecuador, ver step #4.
# Vars seteadas fuera de Cloud Build (vía gcloud run jobs update --update-env-vars):
#   CEREBRO_PUBLISH_ENABLED=true|false  (default false hasta que cerebro-service esté listo)

steps:
  # 1. Build con Dockerfile genérico de agentes, contexto = monorepo root.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.cloudrun-agent
      - --build-arg
      - AGENT_NAME=ops-agent
      - -t
      - gcr.io/$PROJECT_ID/ops-agent:latest
      - .
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ops-agent:latest']

  # 2. Deploy como Cloud Run Job.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ops-agent
      - --image=gcr.io/$PROJECT_ID/ops-agent:latest
      - --region=us-central1
      - --memory=512Mi
      - --cpu=1
      - --max-retries=1
      - --task-timeout=300s
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,GOING_COMMISSION_RATE=0.20
      - --set-secrets=TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,MONGO_URL=MONGO_URL-prod:latest
      - --vpc-connector=going-connector
      - --vpc-egress=all-traffic
      - --service-account=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com

  # 3. Schedule: */15 min hora Ecuador. Crea o actualiza idempotente.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud scheduler jobs describe ops-agent-trigger --location=us-central1 --project=$PROJECT_ID 2>/dev/null \
        && gcloud scheduler jobs update http ops-agent-trigger \
            --location=us-central1 \
            --schedule="*/15 * * * *" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/ops-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID \
        || gcloud scheduler jobs create http ops-agent-trigger \
            --location=us-central1 \
            --schedule="*/15 * * * *" \
            --time-zone="America/Guayaquil" \
            --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/$PROJECT_ID/jobs/ops-agent:run" \
            --message-body='{}' \
            --oauth-service-account-email=going-agent-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --project=$PROJECT_ID

images:
  - gcr.io/$PROJECT_ID/ops-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1500s'

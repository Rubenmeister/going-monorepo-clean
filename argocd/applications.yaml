apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: going-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: going-platform
  source:
    repoURL: https://github.com/Rubenmeister/going-monorepo-clean
    targetRevision: develop
    path: k8s/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: going-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: going-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: going-platform
  source:
    repoURL: https://github.com/Rubenmeister/going-monorepo-clean
    targetRevision: main
    path: k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: going-production
  syncPolicy:
    automated:
      prune: false          # Manual prune for production safety
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m
  revisionHistoryLimit: 10

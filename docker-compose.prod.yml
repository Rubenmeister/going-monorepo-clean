    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  booking-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: booking-service
    container_name: going_booking
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  tours-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: tours-service
    container_name: going_tours
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3007/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  experience-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: experience-service
    container_name: going_experience
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3008/health || exit 1"]
      interval: 30s

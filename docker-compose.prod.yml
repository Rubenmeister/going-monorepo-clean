  host-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: host-service
    container_name: going_host
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:

version: '3.8'

services:
  # Base de Datos Compartida (Postgres para Prod)
  postgres:
    image: postgres:15-alpine
    container_name: going_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: going_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_production_password}
      POSTGRES_DB: going_monorepo
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U going_user -d going_monorepo']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - going-net

  # ==========================================
  # API GATEWAY (Punto de Entrada)
  # ==========================================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: api-gateway
    container_name: going_gateway
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      # Service Discovery (Docker DNS)
      USER_AUTH_SERVICE_URL: http://user-auth-service:3001
      TRANSPORT_SERVICE_URL: http://transport-service:3002
      PARCEL_SERVICE_URL: http://parcel-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3005
      BOOKING_SERVICE_URL: http://booking-service:3006
      TOURS_SERVICE_URL: http://tours-service:3007
      EXPERIENCE_SERVICE_URL: http://experience-service:3008
      HOST_SERVICE_URL: http://host-service:3010
      TRACKING_SERVICE_URL: http://tracking-service:3011
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      user-auth-service:
        condition: service_healthy
    networks:
      - going-net

  # ==========================================
  # MICROSERVICIOS
  # ==========================================

  user-auth-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: user-auth-service
    container_name: going_auth
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  transport-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: transport-service
    container_name: going_transport
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  parcel-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: parcel-service
    container_name: going_parcel
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: payment-service
    container_name: going_payment
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  notifications-service:

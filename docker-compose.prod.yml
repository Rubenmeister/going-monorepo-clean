  tracking-service:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        APP_NAME: tracking-service
    container_name: going_tracking
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3011
      DATABASE_URL: postgresql://going_user:${POSTGRES_PASSWORD:-secure_production_password}@postgres:5432/going_monorepo?schema=public
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3011/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - going-net

  # ==========================================
  # FRONTENDS
  # ==========================================

  frontend-webapp:
    build:
      context: .
      dockerfile: apps/frontend-webapp/Dockerfile
    container_name: going_frontend
    restart: always
    ports:
      - '80:80'
    networks:
      - going-net

  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: going_admin
    restart: always
    ports:
      - '4201:4201'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000 # Client side access to Gateway
    networks:
      - going-net

volumes:
  postgres_data_prod:

networks:
  going-net:
    driver: bridge

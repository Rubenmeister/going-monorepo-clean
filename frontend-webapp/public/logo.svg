<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Going Brand Logo
    Symbol: Curvilinear G-shape representing movement,
    with a dot at the end representing the arrival/destination point.
    Colors: Red #ff4c41 (primary), Yellow #ffd253 (accent), Black #000000
    Font: Nunito Sans Variable
  -->

  <!-- G arc + horizontal bar (red primary stroke) -->
  <!-- Circle center: (100, 82), Radius: 55 -->
  <!-- Start: (139, 43) = upper-right ~1:30 position -->
  <!-- Large CCW arc to right-middle (155, 82), then bar left to (108, 82) -->
  <path
    d="M 139 43 A 55 55 0 1 0 155 82 L 108 82"
    stroke="#ff4c41"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Arrival dot — yellow accent, represents destination -->
  <circle cx="108" cy="82" r="8.5" fill="#ffd253" />

  <!-- Wordmark -->
  <text
    x="100"
    y="182"
    font-family="'Nunito Sans Variable', 'Nunito Sans', Arial, sans-serif"
    font-size="26"
    font-weight="700"
    text-anchor="middle"
    fill="#000000"
  >Going</text>
</svg>
